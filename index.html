/* ===== RACE DAY designation on Best Lap chart ===== */
const RACE_SORT = 20260620;          // race date in YYYYMMDD
const RACE_LABEL = &#x27;Jun 20&#x27;;      // human-readable race date
const raceDayPlugin = {
  id:&#x27;raceDay&#x27;,
  beforeDatasetsDraw(chart){
    // match the chart&#x27;s x-axis: grip-flagged sessions are excluded
    const ordered=[...SESSIONS].filter(s=&gt;!sessionGrip(s)).sort((a,b)=&gt;a.dateSort-b.dateSort);
    // index of first post-race session
    let firstPost=-1;
    for(let i=0;i&lt;ordered.length;i++){ if(ordered[i].dateSort&gt;RACE_SORT){ firstPost=i; break; } }
    const {ctx,chartArea:{top,bottom,right},scales:{x}}=chart;
    const accent=cssVar(&#x27;--accent&#x27;);
    // boundary x: midway between last pre-race and first post-race point;
    // if no post-race sessions, pin the line just inside the right edge.
    let bx;
    if(firstPost===-1){ bx=right; }
    else if(firstPost===0){ bx=x.getPixelForValue(0)-12; }
    else { bx=(x.getPixelForValue(firstPost-1)+x.getPixelForValue(firstPost))/2; }
    ctx.save();
    // shade post-race band
    if(firstPost!==-1){
      ctx.fillStyle=accent; ctx.globalAlpha=0.06;
      ctx.fillRect(bx,top,right-bx,bottom-top);
      ctx.globalAlpha=1;
    }
    // vertical dashed race-day line
    ctx.strokeStyle=accent; ctx.globalAlpha=0.9; ctx.lineWidth=1.5;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(bx,top); ctx.lineTo(bx,bottom); ctx.stroke();
    ctx.setLineDash([]);

    ctx.globalAlpha=1; ctx.fillStyle=accent;
    ctx.font=&#x27;600 9px Barlow Condensed, sans-serif&#x27;;
    ctx.textBaseline=&#x27;top&#x27;;
    const txt=&#x27;RACE DAY · &#x27;+RACE_LABEL;
    if(firstPost===-1){
      // all sessions pre-race: label sits left of the right-edge line, rotated
      ctx.save();
      ctx.translate(bx-4,top+24); ctx.rotate(0);
      ctx.textAlign=&#x27;right&#x27;;
      ctx.fillText(txt,0,0);
      ctx.fillStyle=cssVar(&#x27;--dim&#x27;); ctx.font=&#x27;400 8px Barlow Condensed, sans-serif&#x27;;
      ctx.fillText(&#x27;(all sessions pre-race)&#x27;,0,12);
      ctx.restore();
    } else {
      ctx.textAlign=&#x27;left&#x27;;
      ctx.fillText(txt,bx+5,top+24);
      ctx.fillStyle=cssVar(&#x27;--dim&#x27;); ctx.font=&#x27;400 8px Barlow Condensed, sans-serif&#x27;;
      ctx.fillText(&#x27;post-race sessions →&#x27;,bx+5,top+36);
    }
    ctx.restore();
  }
};

/* ===== TRACK TIMELINE: version segments band across the top of the Best Lap chart ===== */
const TRACK_VER_COLORS = {
  &#x27;v001&#x27;:&#x27;--dim&#x27;, &#x27;v101&#x27;:&#x27;--hawk&#x27;, &#x27;v102&#x27;:&#x27;--accent&#x27;, &#x27;v102_AltSF&#x27;:&#x27;--koch&#x27;, &#x27;v103&#x27;:&#x27;--crews&#x27;
};
const trackTimelinePlugin = {
  id:&#x27;trackTimeline&#x27;,
  beforeDatasetsDraw(chart){
    const ordered=[...SESSIONS].filter(s=&gt;!sessionGrip(s)).sort((a,b)=&gt;a.dateSort-b.dateSort);
    if(!ordered.length) return;
    const {ctx,chartArea:{top,left,right},scales:{x}}=chart;
    const versions=ordered.map(s=&gt;s.track.replace(&#x27;SanDiego_&#x27;,&#x27;&#x27;).replace(&#x27;v102_AltSF&#x27;,&#x27;v102&#x27;));
    // build contiguous segments of identical version
    const segs=[]; let start=0;
    for(let i=1;i&lt;=versions.length;i++){
      if(i===versions.length || versions[i]!==versions[start]){
        segs.push({ver:versions[start], from:start, to:i-1}); start=i;
      }
    }
    const bandH=14, bandTop=top+2;
    ctx.save();
    segs.forEach(seg=&gt;{
      // x extent: midway before first and after last point of the segment
      const x0 = seg.from===0 ? left : (x.getPixelForValue(seg.from-1)+x.getPixelForValue(seg.from))/2;
      const x1 = seg.to===versions.length-1 ? right : (x.getPixelForValue(seg.to)+x.getPixelForValue(seg.to+1))/2;
      const col = cssVar(TRACK_VER_COLORS[seg.ver]||&#x27;--muted&#x27;);
      // tinted bar
      ctx.globalAlpha=0.16; ctx.fillStyle=col;
      ctx.fillRect(x0,bandTop,x1-x0,bandH);
      ctx.globalAlpha=1;
      // top accent line
      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath();
      ctx.moveTo(x0,bandTop); ctx.lineTo(x1,bandTop); ctx.stroke();
      // label (only if segment wide enough)
      if(x1-x0&gt;34){
        ctx.fillStyle=col; ctx.font=&#x27;700 9px Barlow Condensed, sans-serif&#x27;;
        ctx.textBaseline=&#x27;middle&#x27;; ctx.textAlign=&#x27;center&#x27;;
        ctx.fillText(seg.ver, (x0+x1)/2, bandTop+bandH/2+0.5);
      }
    });
    ctx.restore();
  }
};


function buildBestChart(){
  const ctx=document.getElementById(&#x27;bestChart&#x27;);
  const tick=cssVar(&#x27;--dim&#x27;), grid=cssVar(&#x27;--line&#x27;), panel=cssVar(&#x27;--panel&#x27;);
  // exclude grip-flagged sessions (Taylor Gray, +5% grip) so the chart shows only
  // cars running the same grip level — no blank columns for Gray-only sessions
  const ordered=[...SESSIONS].filter(s=&gt;!sessionGrip(s)).sort((a,b)=&gt;a.dateSort-b.dateSort);
  const labels=ordered.map(s=&gt;s.date);

  // one dataset per driver, points only where they ran a non-grip session.
  // `ordered` already excludes +5%-grip sessions, so a driver only shows points
  // for their legit same-grip sessions (e.g. Gray&#x27;s corrected later sessions appear,
  // his earlier over-gripped ones do not).
  const datasets=DRIVERS_PRESENT.map(d=&gt;{
    const data=ordered.map(s=&gt; s.driver===d ? sessionCleanBest(s) : null);
    if(data.every(v=&gt;v===null)) return null; // driver has no legit sessions on this axis
    const hex=driverHex(d);
    return {
      label:d, data,
      borderColor:hex, backgroundColor:hex,
      pointRadius:6, pointHoverRadius:8, pointBorderColor:panel, pointBorderWidth:2,
      borderWidth:2, spanGaps:true, tension:.25,
      borderDash:[]
    };
  }).filter(Boolean);

  if(bestChartObj) bestChartObj.destroy();
  bestChartObj=new Chart(ctx,{
    type:&#x27;line&#x27;,
    data:{labels,datasets},
    plugins:[raceDayPlugin, trackTimelinePlugin],
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{padding:{top:22}},
      interaction:{mode:&#x27;nearest&#x27;,intersect:true},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:panel, borderColor:grid, borderWidth:1,
          titleColor:cssVar(&#x27;--txt&#x27;), bodyColor:cssVar(&#x27;--muted&#x27;), padding:10,
          callbacks:{
            title:(items)=&gt;{ const s=ordered[items[0].dataIndex]; return `${s.date} · ${s.driver}`; },
            label:(c)=&gt;` Best clean: ${c.raw!=null?c.raw.toFixed(2)+&#x27;s&#x27;:&#x27;—&#x27;}`
          }
        }
      },
      scales:{
        x:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}}, grid:{color:grid} },
        y:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:11},callback:v=&gt;v.toFixed(1)},
            grid:{color:grid},
            title:{display:true,text:&#x27;Best Lap (s)&#x27;,color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}} }
      }
    }
  });
}

/* =================== CHART 2: AVG 1ST LAP STRIP =================== */
function buildStripChart(){
  const ctx=document.getElementById(&#x27;stripChart&#x27;);
  const tick=cssVar(&#x27;--dim&#x27;), grid=cssVar(&#x27;--line&#x27;), panel=cssVar(&#x27;--panel&#x27;);

  // build one scatter point per run: x = driver index, y = avg1
  // exclude pure-outlier runs and race-pace runs whose avg1 is far off clean qualifying pace
  const points=[]; const ranges={};
  DRIVERS_PRESENT.forEach((d,i)=&gt;{ ranges[d]={vals:[],i}; });
  SESSIONS.forEach(s=&gt;{
    if(/v001/.test(s.track)) return;         // exclude early v001 development laps (higher-grip track version)
    s.runs.forEach(r=&gt;{
      const cavg=runCleanAvg(r);             // mean of this run&#x27;s clean laps (off-laps excluded)
      if(cavg===null) return;                // skip runs with no clean laps
      const i=DRIVERS_PRESENT.indexOf(s.driver);
      const jitter=(Math.random()-0.5)*0.34;
      points.push({x:i+jitter, y:cavg, _d:s.driver, _s:s.date, _r:r.no});
      ranges[s.driver].vals.push(cavg);
    });
  });

  const scatter={
    type:&#x27;scatter&#x27;,
    data:{datasets:[{
      data:points,
      pointRadius:5, pointHoverRadius:7,
      backgroundColor:points.map(p=&gt;driverHex(p._d)),
      borderColor:panel, borderWidth:1
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:panel, borderColor:grid, borderWidth:1,
          titleColor:cssVar(&#x27;--txt&#x27;), bodyColor:cssVar(&#x27;--muted&#x27;), padding:10,
          callbacks:{
            title:(items)=&gt;{ const p=items[0].raw; return `${p._d}`; },
            label:(c)=&gt;` ${c.raw._s} Run ${c.raw._r}: ${c.raw.y.toFixed(2)}s`
          }
        }
      },
      scales:{
        x:{ min:-0.6, max:DRIVERS_PRESENT.length-0.4,
            ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10},stepSize:1,
              callback:(v)=&gt;{ const i=Math.round(v); return DRIVERS_PRESENT[i]?DRIVERS_PRESENT[i].split(&#x27; &#x27;).pop():&#x27;&#x27;; }},
            grid:{color:grid} },
        y:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:11},callback:v=&gt;v.toFixed(1)},
            grid:{color:grid},
            title:{display:true,text:&#x27;Avg Clean Lap (s)&#x27;,color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}} }
      }
    },
    plugins:[{
      id:&#x27;violin&#x27;,
      beforeDatasetsDraw(chart){
        const {ctx,scales:{x,y},chartArea}=chart;
        DRIVERS_PRESENT.forEach((d,i)=&gt;{
          const vals=ranges[d].vals; if(vals.length&lt;2) return;
          const col=driverHex(d);
          const sorted=[...vals].sort((a,b)=&gt;a-b);
          const mn=Math.min(...vals), mx=Math.max(...vals);
          // kernel density estimate over the value range (Gaussian kernel)
          const n=sorted.length;
          const mean=vals.reduce((a,b)=&gt;a+b,0)/n;
          const sd=Math.sqrt(vals.reduce((a,b)=&gt;a+(b-mean)*(b-mean),0)/n) || 0.4;
          // Silverman&#x27;s rule of thumb for bandwidth, with a sensible floor
          const bw=Math.max(1.06*sd*Math.pow(n,-0.2), 0.18);
          const pad=bw*1.5;
          const lo=mn-pad, hi=mx+pad;
          const STEPS=48;
          const dens=[]; let maxD=0;
          for(let k=0;k&lt;=STEPS;k++){
            const v=lo+(hi-lo)*k/STEPS;
            let sum=0;
            for(let j=0;j&lt;n;j++){ const u=(v-sorted[j])/bw; sum+=Math.exp(-0.5*u*u); }
            const den=sum/(n*bw*Math.sqrt(2*Math.PI));
            dens.push({v,den}); if(den&gt;maxD) maxD=den;
          }
          if(maxD&lt;=0) return;
          const halfMax=0.40; // max half-width in x-units (category spacing is 1)
          const cx=x.getPixelForValue(i);
          const wpx=Math.abs(x.getPixelForValue(i+halfMax)-cx);
          // build violin outline (right side down, left side up)
          ctx.save();
          ctx.beginPath();
          dens.forEach((p,idx)=&gt;{
            const py=y.getPixelForValue(p.v);
            const w=(p.den/maxD)*wpx;
            if(idx===0) ctx.moveTo(cx+w,py); else ctx.lineTo(cx+w,py);
          });
          for(let idx=dens.length-1; idx&gt;=0; idx--){
            const py=y.getPixelForValue(dens[idx].v);
            const w=(dens[idx].den/maxD)*wpx;
            ctx.lineTo(cx-w,py);
          }
          ctx.closePath();
          ctx.fillStyle=col; ctx.globalAlpha=0.16; ctx.fill();
          ctx.globalAlpha=0.55; ctx.strokeStyle=col; ctx.lineWidth=1.25; ctx.stroke();
          ctx.restore();
        });
      }
    },{
      id:&#x27;meanMarker&#x27;,
      afterDatasetsDraw(chart){
        const {ctx,scales:{x,y}}=chart;
        DRIVERS_PRESENT.forEach((d,i)=&gt;{
          const vals=ranges[d].vals; if(!vals.length) return;
          const mean=vals.reduce((a,b)=&gt;a+b,0)/vals.length;
          const px=x.getPixelForValue(i), py=y.getPixelForValue(mean);
          const col=driverHex(d);
          // mean marker: filled diamond with a light ring for contrast
          ctx.save();
          ctx.translate(px,py); ctx.rotate(Math.PI/4);
          ctx.fillStyle=col; ctx.strokeStyle=cssVar(&#x27;--txt&#x27;); ctx.lineWidth=1.5;
          const s=5;
          ctx.fillRect(-s,-s,2*s,2*s); ctx.strokeRect(-s,-s,2*s,2*s);
          ctx.restore();
        });
      }
    }]
  };
  if(stripChartObj) stripChartObj.destroy();
  stripChartObj=new Chart(ctx,scatter);
}

  }
  html+=`&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Driver&lt;/span&gt;`;
  html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;driver&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
  DRIVERS_PRESENT.forEach(d=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;driver&quot; data-val=&quot;${d}&quot;&gt;${d.split(&#x27; &#x27;).pop()}&lt;/button&gt;`; });
  html+=`&lt;/div&gt;&lt;div class=&quot;filter-sep&quot;&gt;&lt;/div&gt;&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Sim&lt;/span&gt;`;
  html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;sim&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
  sims.forEach(sm=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;sim&quot; data-val=&quot;${sm}&quot;&gt;${sm}&lt;/button&gt;`; });
  html+=`&lt;/div&gt;`;
  if(tires.length){
    html+=`&lt;div class=&quot;filter-sep&quot;&gt;&lt;/div&gt;&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Tire&lt;/span&gt;`;
    html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;tire&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
    tires.forEach(t=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;tire&quot; data-val=&quot;${t}&quot;&gt;${t}&lt;/button&gt;`; });
    html+=`&lt;/div&gt;`;
  }
  f.innerHTML=html;
  f.querySelectorAll(&#x27;.filter-btn&#x27;).forEach(btn=&gt;{
    btn.addEventListener(&#x27;click&#x27;,()=&gt;{
      const type=btn.dataset.type;
      f.querySelectorAll(`.filter-btn[data-type=&quot;${type}&quot;]`).forEach(b=&gt;b.classList.remove(&#x27;active&#x27;));
      btn.classList.add(&#x27;active&#x27;);
      if(type===&#x27;driver&#x27;) activeDriver=btn.dataset.val;
      else if(type===&#x27;sim&#x27;) activeSim=btn.dataset.val;
      else if(type===&#x27;track&#x27;) activeTrack=btn.dataset.val;
      else activeTire=btn.dataset.val;
      renderSessions();
    });
  });
}

/* =================== RENDER: SESSION CARDS =================== */
function renderSessions(){
  const g=document.getElementById(&#x27;sessions-grid&#x27;);
  const ordered=[...SESSIONS].sort((a,b)=&gt;a.dateSort-b.dateSort);
  const cards=ordered.filter(s=&gt;
    (activeDriver===&#x27;all&#x27;||s.driver===activeDriver) &amp;&amp;
    (activeSim===&#x27;all&#x27;||s.sim===activeSim) &amp;&amp;
    (activeTire===&#x27;all&#x27;||s.tire===activeTire) &amp;&amp;
    (activeTrack===&#x27;all&#x27;||s.track===activeTrack)
  ).map(s=&gt;{
    const sBest=sessionCleanBest(s);
    const grip=sessionGrip(s);
    const runsHtml=s.runs.map(r=&gt;{
      const cb=runCleanBest(r);
      const allOutlier=cb===null;
      const isBest=cb!==null &amp;&amp; sBest!==null &amp;&amp; Math.abs(cb-sBest)&lt;1e-6;
      const bestCls=allOutlier?&#x27;outlier&#x27;:(isBest?&#x27;session-best&#x27;:&#x27;&#x27;);
      const bestVal=allOutlier?(r.times[0]!=null?r.times[0].toFixed(2):&#x27;—&#x27;):cb.toFixed(2);
      return `&lt;div class=&quot;run&quot;&gt;
        &lt;div class=&quot;run-no&quot;&gt;R${r.no}&lt;/div&gt;
        &lt;div class=&quot;run-body&quot;&gt;
          &lt;div class=&quot;run-desc&quot;&gt;${r.desc}&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;run-avg&quot;&gt;${r.avg1!=null?r.avg1.toFixed(2):&#x27;—&#x27;}&lt;br&gt;&lt;span style=&quot;color:var(--dim)&quot;&gt;avg1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;run-laps&quot;&gt;${runValidLapCount(r)}L&lt;/div&gt;
        &lt;div class=&quot;run-best ${bestCls}&quot;&gt;${bestVal}&lt;/div&gt;
      &lt;/div&gt;`;
    }).join(&#x27;&#x27;);

    const comments=s.runs.filter(r=&gt;r.comment).map(r=&gt;
      `&lt;div class=&quot;comment&quot;&gt;&lt;span class=&quot;comment-no&quot;&gt;R${r.no}&lt;/span&gt;${r.comment}&lt;/div&gt;`
    ).join(&#x27;&#x27;);

    return `&lt;div class=&quot;session-card&quot; style=&quot;--cc:${driverColor(s.driver)}&quot;&gt;
      &lt;div class=&quot;session-head&quot;&gt;
        &lt;div class=&quot;session-driver&quot;&gt;${s.driver}&lt;/div&gt;
        &lt;div class=&quot;session-date&quot;&gt;
          &lt;span&gt;${s.date}, 2026 · ${s.car}&lt;/span&gt;
          &lt;span class=&quot;tagpill track&quot;&gt;${s.track.replace(&#x27;SanDiego_&#x27;,&#x27;&#x27;)}&lt;/span&gt;
          &lt;span class=&quot;tagpill ${s.sim.toLowerCase()}&quot;&gt;${s.sim}&lt;/span&gt;
          ${s.tire?`&lt;span class=&quot;tagpill tire&quot;&gt;${s.tire}&lt;/span&gt;`:&#x27;&#x27;}
          ${grip?&#x27;&lt;span class=&quot;tagpill grip&quot;&gt;+5% grip&lt;/span&gt;&#x27;:&#x27;&#x27;}
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;session-meta&quot;&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Runs&lt;/div&gt;&lt;div class=&quot;sm-v&quot;&gt;${s.runs.length}&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Valid Laps&lt;/div&gt;&lt;div class=&quot;sm-v&quot;&gt;${sessionValidLaps(s)}&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Best Clean&lt;/div&gt;&lt;div class=&quot;sm-v&quot; style=&quot;color:${grip?driverColor(s.driver):&#x27;var(--accent)&#x27;}&quot;&gt;${sBest!=null?sBest.toFixed(2):&#x27;—&#x27;}&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      ${grip?`&lt;div class=&quot;note-banner grip&quot;&gt;▲ All ${s.driver.split(&#x27; &#x27;).pop()} sessions carry +5% artificial grip — excluded from headline comparisons.&lt;/div&gt;`:&#x27;&#x27;}
      ${(s.note &amp;&amp; !/\+5% grip/.test(s.note))?`&lt;div class=&quot;note-banner&quot;&gt;● ${s.note}&lt;/div&gt;`:&#x27;&#x27;}
      &lt;div class=&quot;runs&quot;&gt;${runsHtml}&lt;/div&gt;
      ${comments?`&lt;div class=&quot;comments-block&quot;&gt;${comments}&lt;/div&gt;`:&#x27;&#x27;}
    &lt;/div&gt;`;
  }).join(&#x27;&#x27;);
  g.innerHTML=cards || `&lt;div style=&quot;font-family:var(--mono);font-size:12px;color:var(--dim);padding:20px&quot;&gt;No sessions match this filter.&lt;/div&gt;`;
}

/* =================== THEME =================== */
function rebuildCharts(){ buildBestChart(); buildStripChart(); }
document.getElementById(&#x27;themebtn&#x27;).addEventListener(&#x27;click&#x27;,()=&gt;{
  document.body.classList.toggle(&#x27;light&#x27;);
  try{ localStorage.setItem(&#x27;sd_theme&#x27;, document.body.classList.contains(&#x27;light&#x27;)?&#x27;light&#x27;:&#x27;dark&#x27;); }catch(e){}
  setTimeout(rebuildCharts,30);
});

/* =================== INIT =================== */
function startApp(){
  try{ if(localStorage.getItem(&#x27;sd_theme&#x27;)===&#x27;light&#x27;) document.body.classList.add(&#x27;light&#x27;); }catch(e){}
  renderHeaderStats();
  renderSummary();
  renderCounters();
  renderFilters();
  renderSessions();
  rebuildCharts();
}

(function(){
  const PW=&#x27;joegibbs&#x27;;
  const gate=document.getElementById(&#x27;lockgate&#x27;);
  const app=document.getElementById(&#x27;app&#x27;);
  const input=document.getElementById(&#x27;lockinput&#x27;);
  const btn=document.getElementById(&#x27;lockbtn&#x27;);
  const err=document.getElementById(&#x27;lockerr&#x27;);
  function reveal(){ gate.style.display=&#x27;none&#x27;; app.classList.remove(&#x27;app-hidden&#x27;); startApp(); }
  try{ if(sessionStorage.getItem(&#x27;sd_auth&#x27;)===&#x27;1&#x27;){ reveal(); return; } }catch(e){}
  function attempt(){
    if(input.value===PW){ try{sessionStorage.setItem(&#x27;sd_auth&#x27;,&#x27;1&#x27;);}catch(e){} reveal(); }
    else { err.textContent=&#x27;Incorrect password&#x27;; gate.classList.add(&#x27;shake&#x27;); setTimeout(()=&gt;gate.classList.remove(&#x27;shake&#x27;),400); input.value=&#x27;&#x27;; input.focus(); }
  }
  btn.addEventListener(&#x27;click&#x27;,attempt);
  input.addEventListener(&#x27;keydown&#x27;,e=&gt;{ if(e.key===&#x27;Enter&#x27;) attempt(); });
  input.focus();
})();

/* ===== LOCK GATE ===== */
.lockgate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(900px 500px at 50% -10%,rgba(230,184,79,.07),transparent 60%),var(--bg)}
.lockbox{width:min(360px,90vw);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:34px 30px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.lockbrand{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;color:var(--accent);margin-bottom:12px;text-transform:uppercase;line-height:1.8}
.locktitle{font-family:var(--cond);font-size:30px;font-weight:900;text-transform:uppercase;margin:0 0 4px}
.locksub{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;color:var(--muted);margin:0 0 22px;text-transform:uppercase}
.lockinput{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:8px;color:var(--txt);font-family:var(--mono);font-size:15px;padding:13px 14px;letter-spacing:1px;outline:none;transition:.15s}
.lockinput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,184,79,.15)}
.lockbtn{width:100%;margin-top:14px;background:var(--accent);color:#0b0b0b;border:none;border-radius:8px;font-family:var(--cond);font-weight:800;font-size:16px;letter-spacing:1px;text-transform:uppercase;padding:13px;cursor:pointer;transition:.15s}
.lockbtn:hover{filter:brightness(1.08)}
.lockerr{min-height:18px;margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--jones)}
.lockgate.shake .lockbox{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.app-hidden{display:none}

@media(max-width:720px){
  h1{font-size:42px}
  .header{padding:24px 18px 20px}
  .eyebrow{padding-right:44px}            /* clear the theme toggle button */
  .themebtn{top:20px;right:18px}
  .content{padding:22px 18px 0}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .header-stats{margin-top:16px}
  .hstat{padding:4px 14px}
  .hstat-val{font-size:34px}
  .chart-wrap{height:260px}
  .chart-card{padding:16px 14px 12px}
  .counter-grid{grid-template-columns:repeat(2,1fr)}
  .chart-title{font-size:19px}
  .chart-sub{max-width:100%;text-align:left}
  .sessions-grid{grid-template-columns:1fr}
  .run{gap:8px}
  .run-avg{min-width:46px;font-size:10.5px}
  .run-laps{min-width:26px;font-size:10.5px}
  .run-best{min-width:54px;font-size:18px}
  .run-desc{font-size:14px}
  .filters{gap:6px}
  .filter-sep{display:none}               /* dividers float when groups wrap; hide on mobile */
  .filter-group{width:100%}               /* each filter group on its own row */
}

function driverHex(d){ return cssVar(DRIVER_META[d].color); }        // resolved hex for canvas/Chart.js
function isGrip(d){ return !!DRIVER_META[d].grip; }

/* valid laps = times below outlier threshold; cleanBest = min valid time */

function runValidTimes(run){ return run.times.filter(t=&gt;t&lt;OUTLIER); }
function runCleanBest(run){ const v=runValidTimes(run); return v.length?Math.min(...v):null; }
function runCleanAvg(run){ const v=runValidTimes(run); return v.length? v.reduce((a,b)=&gt;a+b,0)/v.length : null; }
function runValidLapCount(run){ return runValidTimes(run).length; }

function sessionCleanBest(s){
  let best=null;
  s.runs.forEach(r=&gt;{ const b=runCleanBest(r); if(b!==null &amp;&amp; (best===null||b&lt;best)) best=b; });
  return best;
}
function sessionValidLaps(s){ return s.runs.reduce((n,r)=&gt;n+runValidLapCount(r),0); }

/* total valid laps across all sessions */
const TOTAL_VALID = SESSIONS.reduce((n,s)=&gt;n+sessionValidLaps(s),0);

/* clean best excluding grip-flagged drivers (headline) */
let cleanBest={time:Infinity,driver:null,session:null,run:null};
let gripBest={time:Infinity,driver:null,session:null,run:null};
SESSIONS.forEach(s=&gt;{
  s.runs.forEach(r=&gt;{
    const b=runCleanBest(r); if(b===null) return;
    const target=isGrip(s.driver)?gripBest:cleanBest;
    if(b&lt;target.time){ target.time=b; target.driver=s.driver; target.session=s.date; target.run=r.no; }
  });
});

/* =================== RENDER: SUMMARY =================== */
function renderSummary(){
  const g=document.getElementById(&#x27;summary-grid&#x27;);
  const cards=[];

  // headline overall best (no grip exclusion — all drivers valid)
  if(cleanBest.driver){
    cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-label&quot;&gt;Best Clean Lap&lt;/div&gt;
      &lt;div class=&quot;summary-val&quot; style=&quot;color:${driverColor(cleanBest.driver)}&quot;&gt;${cleanBest.time.toFixed(2)}&lt;/div&gt;
      &lt;div class=&quot;summary-sub&quot;&gt;${cleanBest.driver} · ${cleanBest.session} Run ${cleanBest.run}&lt;br&gt;off-pace laps excluded&lt;/div&gt;&lt;/div&gt;`);
  }

  // best run avg (lowest avg 1st-lap across valid runs)
  let bestAvg={time:Infinity,driver:null,session:null,run:null};
  SESSIONS.forEach(s=&gt;s.runs.forEach(r=&gt;{
    if(runCleanBest(r)===null||r.avg1&gt;=OUTLIER) return;
    if(r.avg1&lt;bestAvg.time){ bestAvg={time:r.avg1,driver:s.driver,session:s.date,run:r.no}; }
  }));
  if(bestAvg.driver){
    cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot; style=&quot;background:${driverColor(bestAvg.driver)}&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-label&quot;&gt;Best Run Avg&lt;/div&gt;
      &lt;div class=&quot;summary-val&quot; style=&quot;color:${driverColor(bestAvg.driver)}&quot;&gt;${bestAvg.time.toFixed(2)}&lt;/div&gt;
      &lt;div class=&quot;summary-sub&quot;&gt;${bestAvg.driver} · ${bestAvg.session} Run ${bestAvg.run}&lt;br&gt;avg of 1st 3 laps&lt;/div&gt;&lt;/div&gt;`);
  }

  // drivers count
  cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot; style=&quot;background:var(--muted)&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;summary-label&quot;&gt;Drivers&lt;/div&gt;
    &lt;div class=&quot;summary-val&quot;&gt;${DRIVERS_PRESENT.length}&lt;/div&gt;
    &lt;div class=&quot;summary-sub&quot;&gt;${DRIVERS_PRESENT.map(d=&gt;d.split(&#x27; &#x27;).pop()).join(&#x27; · &#x27;)}&lt;/div&gt;&lt;/div&gt;`);

  // dominant finding
  cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot; style=&quot;background:var(--jones)&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;summary-label&quot;&gt;Dominant Finding&lt;/div&gt;
    &lt;div class=&quot;summary-val&quot; style=&quot;font-size:26px&quot;&gt;Rear Grip&lt;/div&gt;
    &lt;div class=&quot;summary-sub&quot;&gt;Cross-driver: lacking rear drive / tracking, esp. in slow-speed exits &amp;amp; fast direction changes&lt;/div&gt;&lt;/div&gt;`);

  g.innerHTML=cards.join(&#x27;&#x27;);
}

/* =================== CHART 1: BEST LAP PER SESSION =================== */
let bestChartObj, stripChartObj;

/* ===== RACE DAY designation on Best Lap chart ===== */
const RACE_SORT = 20260627;          // race date in YYYYMMDD
const RACE_LABEL = &#x27;Jun 27&#x27;;      // human-readable race date
const raceDayPlugin = {
  id:&#x27;raceDay&#x27;,
  beforeDatasetsDraw(chart){
    const ordered=[...SESSIONS].filter(s=&gt;!isGrip(s.driver)).sort((a,b)=&gt;a.dateSort-b.dateSort);
    // index of first post-race session
    let firstPost=-1;
    for(let i=0;i&lt;ordered.length;i++){ if(ordered[i].dateSort&gt;RACE_SORT){ firstPost=i; break; } }
    const {ctx,chartArea:{top,bottom,right},scales:{x}}=chart;
    const accent=cssVar(&#x27;--accent&#x27;);
    // boundary x: midway between last pre-race and first post-race point;
    // if no post-race sessions, pin the line just inside the right edge.
    let bx;
    if(firstPost===-1){ bx=right; }
    else if(firstPost===0){ bx=x.getPixelForValue(0)-12; }
    else { bx=(x.getPixelForValue(firstPost-1)+x.getPixelForValue(firstPost))/2; }
    ctx.save();
    // shade post-race band
    if(firstPost!==-1){
      ctx.fillStyle=accent; ctx.globalAlpha=0.06;
      ctx.fillRect(bx,top,right-bx,bottom-top);
      ctx.globalAlpha=1;
    }
    // vertical dashed race-day line
    ctx.strokeStyle=accent; ctx.globalAlpha=0.9; ctx.lineWidth=1.5;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(bx,top); ctx.lineTo(bx,bottom); ctx.stroke();
    ctx.setLineDash([]);
    // label
    ctx.globalAlpha=1; ctx.fillStyle=accent;
    ctx.font=&#x27;600 9px Barlow Condensed, sans-serif&#x27;;
    ctx.textBaseline=&#x27;top&#x27;;
    const txt=&#x27;RACE DAY · &#x27;+RACE_LABEL;
    if(firstPost===-1){
      // all sessions pre-race: label sits left of the right-edge line, rotated
      ctx.save();
      ctx.translate(bx-4,top+24); ctx.rotate(0);
      ctx.textAlign=&#x27;right&#x27;;
      ctx.fillText(txt,0,0);
      ctx.fillStyle=cssVar(&#x27;--dim&#x27;); ctx.font=&#x27;400 8px Barlow Condensed, sans-serif&#x27;;
      ctx.fillText(&#x27;(all sessions pre-race)&#x27;,0,12);
      ctx.restore();
    } else {
      ctx.textAlign=&#x27;left&#x27;;
      ctx.fillText(txt,bx+5,top+24);
      ctx.fillStyle=cssVar(&#x27;--dim&#x27;); ctx.font=&#x27;400 8px Barlow Condensed, sans-serif&#x27;;
      ctx.fillText(&#x27;post-race sessions →&#x27;,bx+5,top+36);
    }
    ctx.restore();
  }
};


/* ===== TRACK TIMELINE: version segments band across the top of the Best Lap chart ===== */
const TL_PALETTE = [&#x27;--dim&#x27;,&#x27;--hawk&#x27;,&#x27;--accent&#x27;,&#x27;--koch&#x27;,&#x27;--saw&#x27;,&#x27;--crews&#x27;];
const trackTimelinePlugin = {
  id:&#x27;trackTimeline&#x27;,
  beforeDatasetsDraw(chart){
    const ordered=[...SESSIONS].filter(s=&gt;!isGrip(s.driver)).sort((a,b)=&gt;a.dateSort-b.dateSort);
    if(!ordered.length) return;
    const {ctx,chartArea:{top,left,right},scales:{x}}=chart;
    const versions=ordered.map(s=&gt;s.track.replace(&#x27;Sonoma_&#x27;,&#x27;&#x27;).replace(/_AltSF$/,&#x27;&#x27;));
    const segs=[]; let start=0;
    for(let i=1;i&lt;=versions.length;i++){
      if(i===versions.length || versions[i]!==versions[start]){
        segs.push({ver:versions[start], from:start, to:i-1}); start=i;
      }
    }
    // assign a stable color per distinct version (first-seen order)
    const verColor={}; let ci=0;
    segs.forEach(s=&gt;{ if(!(s.ver in verColor)){ verColor[s.ver]=TL_PALETTE[ci%TL_PALETTE.length]; ci++; } });
    const bandH=14, bandTop=top+2;
    ctx.save();
    segs.forEach(seg=&gt;{
      const x0 = seg.from===0 ? left : (x.getPixelForValue(seg.from-1)+x.getPixelForValue(seg.from))/2;
      const x1 = seg.to===versions.length-1 ? right : (x.getPixelForValue(seg.to)+x.getPixelForValue(seg.to+1))/2;
      const col = cssVar(verColor[seg.ver]||&#x27;--muted&#x27;);
      ctx.globalAlpha=0.16; ctx.fillStyle=col; ctx.fillRect(x0,bandTop,x1-x0,bandH); ctx.globalAlpha=1;
      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x0,bandTop); ctx.lineTo(x1,bandTop); ctx.stroke();
      if(x1-x0&gt;34){
        ctx.fillStyle=col; ctx.font=&#x27;700 9px Barlow Condensed, sans-serif&#x27;;
        ctx.textBaseline=&#x27;middle&#x27;; ctx.textAlign=&#x27;center&#x27;;
        ctx.fillText(seg.ver, (x0+x1)/2, bandTop+bandH/2+0.5);
      }
    });
    ctx.restore();
  }
};

function buildBestChart(){
  const ctx=document.getElementById(&#x27;bestChart&#x27;);
  const tick=cssVar(&#x27;--dim&#x27;), grid=cssVar(&#x27;--line&#x27;), panel=cssVar(&#x27;--panel&#x27;);
  // exclude grip-flagged sessions (Taylor Gray, +5% grip) so the chart shows only
  // cars running the same grip level — no blank columns for Gray-only sessions
  const ordered=[...SESSIONS].filter(s=&gt;!isGrip(s.driver)).sort((a,b)=&gt;a.dateSort-b.dateSort);
  const labels=ordered.map(s=&gt;s.date);

  // one dataset per driver, points only where they ran
  // grip-flagged drivers (e.g. Taylor Gray, +5% grip) are excluded so the chart
  // reflects real pace among cars running the same grip level
  const datasets=DRIVERS_PRESENT.filter(d=&gt;!isGrip(d)).map(d=&gt;{
    const data=ordered.map(s=&gt; s.driver===d ? sessionCleanBest(s) : null);
    const hex=driverHex(d);
    return {
      label:d, data,
      borderColor:hex, backgroundColor:hex,
      pointRadius:6, pointHoverRadius:8, pointBorderColor:panel, pointBorderWidth:2,
      borderWidth:2, spanGaps:true, tension:.25,
      borderDash:isGrip(d)?[5,4]:[]
    };
  });

  if(bestChartObj) bestChartObj.destroy();
  bestChartObj=new Chart(ctx,{
    type:&#x27;line&#x27;,
    data:{labels,datasets},
    plugins:[raceDayPlugin, trackTimelinePlugin],
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{padding:{top:22}},
      interaction:{mode:&#x27;nearest&#x27;,intersect:true},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:panel, borderColor:grid, borderWidth:1,
          titleColor:cssVar(&#x27;--txt&#x27;), bodyColor:cssVar(&#x27;--muted&#x27;), padding:10,
          callbacks:{
            title:(items)=&gt;{ const s=ordered[items[0].dataIndex]; return `${s.date} · ${s.driver}`; },
            label:(c)=&gt;` Best clean: ${c.raw!=null?c.raw.toFixed(2)+&#x27;s&#x27;:&#x27;—&#x27;}`
          }
        }
      },
      scales:{
        x:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}}, grid:{color:grid} },
        y:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:11},callback:v=&gt;v.toFixed(1)},
            grid:{color:grid},
            title:{display:true,text:&#x27;Best Lap (s)&#x27;,color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}} }
      }
    }
  });
}

/* =================== CHART 2: AVG 1ST LAP STRIP =================== */
function buildStripChart(){
  const ctx=document.getElementById(&#x27;stripChart&#x27;);
  const tick=cssVar(&#x27;--dim&#x27;), grid=cssVar(&#x27;--line&#x27;), panel=cssVar(&#x27;--panel&#x27;);

  // build one scatter point per run: x = driver index, y = avg1
  // exclude pure-outlier runs and race-pace runs whose avg1 is far off clean qualifying pace
  const points=[]; const ranges={};
  DRIVERS_PRESENT.forEach((d,i)=&gt;{ ranges[d]={vals:[],i}; });
  SESSIONS.forEach(s=&gt;{
    s.runs.forEach(r=&gt;{
      const cavg=runCleanAvg(r);             // mean of this run&#x27;s clean laps (off-laps excluded)
      if(cavg===null) return;                // skip runs with no clean laps
      const i=DRIVERS_PRESENT.indexOf(s.driver);
      const jitter=(Math.random()-0.5)*0.34;
      points.push({x:i+jitter, y:cavg, _d:s.driver, _s:s.date, _r:r.no});
      ranges[s.driver].vals.push(cavg);
    });
  });

  const scatter={
    type:&#x27;scatter&#x27;,
    data:{datasets:[{
      data:points,
      pointRadius:5, pointHoverRadius:7,
      backgroundColor:points.map(p=&gt;driverHex(p._d)),
      borderColor:panel, borderWidth:1
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:panel, borderColor:grid, borderWidth:1,
          titleColor:cssVar(&#x27;--txt&#x27;), bodyColor:cssVar(&#x27;--muted&#x27;), padding:10,
          callbacks:{
            title:(items)=&gt;{ const p=items[0].raw; return `${p._d}`; },
            label:(c)=&gt;` ${c.raw._s} Run ${c.raw._r}: ${c.raw.y.toFixed(2)}s`
          }
        }
      },
      scales:{
        x:{ min:-0.6, max:DRIVERS_PRESENT.length-0.4,
            ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10},stepSize:1,
              callback:(v)=&gt;{ const i=Math.round(v); return DRIVERS_PRESENT[i]?DRIVERS_PRESENT[i].split(&#x27; &#x27;).pop():&#x27;&#x27;; }},
            grid:{color:grid} },
        y:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:11},callback:v=&gt;v.toFixed(1)},
            grid:{color:grid},
            title:{display:true,text:&#x27;Avg Clean Lap (s)&#x27;,color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}} }
      }
    },
    plugins:[{
      id:&#x27;violin&#x27;,
      beforeDatasetsDraw(chart){
        const {ctx,scales:{x,y}}=chart;
        DRIVERS_PRESENT.forEach((d,i)=&gt;{
          const vals=ranges[d].vals; if(vals.length&lt;2) return;
          const col=driverHex(d);
          const sorted=[...vals].sort((a,b)=&gt;a-b);
          const mn=Math.min(...vals), mx=Math.max(...vals);
          const n=sorted.length;
          const mean=vals.reduce((a,b)=&gt;a+b,0)/n;
          const sd=Math.sqrt(vals.reduce((a,b)=&gt;a+(b-mean)*(b-mean),0)/n) || 0.4;
          const bw=Math.max(1.06*sd*Math.pow(n,-0.2), 0.18);
          const pad=bw*1.5;
          const lo=mn-pad, hi=mx+pad;
          const STEPS=48;
          const dens=[]; let maxD=0;
          for(let k=0;k&lt;=STEPS;k++){
            const v=lo+(hi-lo)*k/STEPS;
            let sum=0;
            for(let j=0;j&lt;n;j++){ const u=(v-sorted[j])/bw; sum+=Math.exp(-0.5*u*u); }
            const den=sum/(n*bw*Math.sqrt(2*Math.PI));
            dens.push({v,den}); if(den&gt;maxD) maxD=den;
          }
          if(maxD&lt;=0) return;
          const halfMax=0.40;
          const cx=x.getPixelForValue(i);
          const wpx=Math.abs(x.getPixelForValue(i+halfMax)-cx);
          ctx.save();
          ctx.beginPath();
          dens.forEach((p,idx)=&gt;{
            const py=y.getPixelForValue(p.v);
            const w=(p.den/maxD)*wpx;
            if(idx===0) ctx.moveTo(cx+w,py); else ctx.lineTo(cx+w,py);
          });
          for(let idx=dens.length-1; idx&gt;=0; idx--){
            const py=y.getPixelForValue(dens[idx].v);
            const w=(dens[idx].den/maxD)*wpx;
            ctx.lineTo(cx-w,py);
          }
          ctx.closePath();
          ctx.fillStyle=col; ctx.globalAlpha=0.16; ctx.fill();
          ctx.globalAlpha=0.55; ctx.strokeStyle=col; ctx.lineWidth=1.25; ctx.stroke();
          ctx.restore();
        });
      }
    },{
      id:&#x27;meanMarker&#x27;,
      afterDatasetsDraw(chart){
        const {ctx,scales:{x,y}}=chart;
        DRIVERS_PRESENT.forEach((d,i)=&gt;{
          const vals=ranges[d].vals; if(!vals.length) return;
          const mean=vals.reduce((a,b)=&gt;a+b,0)/vals.length;
          const px=x.getPixelForValue(i), py=y.getPixelForValue(mean);
          const col=driverHex(d);
          ctx.save();
          ctx.translate(px,py); ctx.rotate(Math.PI/4);
          ctx.fillStyle=col; ctx.strokeStyle=cssVar(&#x27;--txt&#x27;); ctx.lineWidth=1.5;
          const s=5;
          ctx.fillRect(-s,-s,2*s,2*s); ctx.strokeRect(-s,-s,2*s,2*s);
          ctx.restore();
        });
      }
    }]
  };
  if(stripChartObj) stripChartObj.destroy();
  stripChartObj=new Chart(ctx,scatter);
}

/* =================== RENDER: DRIVER COUNTERS =================== */
function renderCounters(){
  const g=document.getElementById(&#x27;counter-grid&#x27;);
  const byDriver={};
  DRIVERS_PRESENT.forEach(d=&gt;byDriver[d]={laps:0,runs:0,sessions:0});
  SESSIONS.forEach(s=&gt;{
    byDriver[s.driver].sessions++;
    s.runs.forEach(r=&gt;{ byDriver[s.driver].laps+=runValidLapCount(r); byDriver[s.driver].runs++; });
  });
  g.innerHTML=DRIVERS_PRESENT.map(d=&gt;{
    const b=byDriver[d];
    return `&lt;div class=&quot;counter&quot; style=&quot;--cc:${driverColor(d)}&quot;&gt;
      &lt;div class=&quot;counter-name&quot;&gt;${d}&lt;/div&gt;
      &lt;div class=&quot;counter-laps&quot; style=&quot;color:${driverColor(d)}&quot;&gt;${b.laps}&lt;small&gt;valid laps&lt;/small&gt;&lt;/div&gt;
      &lt;div class=&quot;counter-sub&quot;&gt;${b.sessions} session${b.sessions&gt;1?&#x27;s&#x27;:&#x27;&#x27;} · ${b.runs} runs${isGrip(d)?&#x27; · +5% grip&#x27;:&#x27;&#x27;}&lt;/div&gt;

/* =================== RENDER: FILTERS =================== */
let activeDriver=&#x27;all&#x27;, activeSim=&#x27;all&#x27;, activeTire=&#x27;all&#x27;, activeTrack=&#x27;all&#x27;;
function renderFilters(){
  const tracks=[...new Set(SESSIONS.map(s=&gt;s.track))].sort();
  const sims=[...new Set(SESSIONS.map(s=&gt;s.sim))];
  const tires=[...new Set(SESSIONS.map(s=&gt;s.tire).filter(Boolean))];
  const f=document.getElementById(&#x27;filters&#x27;);
  let html=&#x27;&#x27;;
  if(tracks.length&gt;1){
    html+=`&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Track&lt;/span&gt;`;
    html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;track&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
    tracks.forEach(t=&gt;{ const short=t.replace(&#x27;Sonoma_&#x27;,&#x27;&#x27;); html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;track&quot; data-val=&quot;${t}&quot;&gt;${short}&lt;/button&gt;`; });
    html+=`&lt;/div&gt;&lt;div class=&quot;filter-sep&quot;&gt;&lt;/div&gt;`;
  }
  html+=`&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Driver&lt;/span&gt;`;
  html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;driver&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
  DRIVERS_PRESENT.forEach(d=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;driver&quot; data-val=&quot;${d}&quot;&gt;${d.split(&#x27; &#x27;).pop()}&lt;/button&gt;`; });
  html+=`&lt;/div&gt;&lt;div class=&quot;filter-sep&quot;&gt;&lt;/div&gt;&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Sim&lt;/span&gt;`;
  html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;sim&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
  sims.forEach(sm=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;sim&quot; data-val=&quot;${sm}&quot;&gt;${sm}&lt;/button&gt;`; });
  html+=`&lt;/div&gt;`;
  if(tires.length){
    html+=`&lt;div class=&quot;filter-sep&quot;&gt;&lt;/div&gt;&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Tire&lt;/span&gt;`;
    html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;tire&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
    tires.forEach(t=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;tire&quot; data-val=&quot;${t}&quot;&gt;${t}&lt;/button&gt;`; });
    html+=`&lt;/div&gt;`;
  }
  f.innerHTML=html;
  f.querySelectorAll(&#x27;.filter-btn&#x27;).forEach(btn=&gt;{
    btn.addEventListener(&#x27;click&#x27;,()=&gt;{
      const type=btn.dataset.type;
      f.querySelectorAll(`.filter-btn[data-type=&quot;${type}&quot;]`).forEach(b=&gt;b.classList.remove(&#x27;active&#x27;));
      btn.classList.add(&#x27;active&#x27;);
      if(type===&#x27;driver&#x27;) activeDriver=btn.dataset.val;
      else if(type===&#x27;sim&#x27;) activeSim=btn.dataset.val;
      else if(type===&#x27;track&#x27;) activeTrack=btn.dataset.val;
      else activeTire=btn.dataset.val;
      renderSessions();
    });
  });
}

/* =================== RENDER: SESSION CARDS =================== */
function renderSessions(){
  const g=document.getElementById(&#x27;sessions-grid&#x27;);
  const ordered=[...SESSIONS].sort((a,b)=&gt;a.dateSort-b.dateSort);
  const cards=ordered.filter(s=&gt;
    (activeDriver===&#x27;all&#x27;||s.driver===activeDriver) &amp;&amp;
    (activeSim===&#x27;all&#x27;||s.sim===activeSim) &amp;&amp;
    (activeTire===&#x27;all&#x27;||s.tire===activeTire) &amp;&amp;
    (activeTrack===&#x27;all&#x27;||s.track===activeTrack)
  ).map(s=&gt;{
    const sBest=sessionCleanBest(s);
    const grip=isGrip(s.driver);
    const runsHtml=s.runs.map(r=&gt;{
      const cb=runCleanBest(r);
      const allOutlier=cb===null;
      const isBest=cb!==null &amp;&amp; sBest!==null &amp;&amp; Math.abs(cb-sBest)&lt;1e-6;
      const bestCls=allOutlier?&#x27;outlier&#x27;:(isBest?&#x27;session-best&#x27;:&#x27;&#x27;);
      const bestVal=allOutlier?(r.times[0]!=null?r.times[0].toFixed(2):&#x27;—&#x27;):cb.toFixed(2);
      return `&lt;div class=&quot;run&quot;&gt;
        &lt;div class=&quot;run-no&quot;&gt;R${r.no}&lt;/div&gt;
        &lt;div class=&quot;run-body&quot;&gt;
          &lt;div class=&quot;run-desc&quot;&gt;${r.desc}&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;run-avg&quot;&gt;${r.avg1!=null?r.avg1.toFixed(2):&#x27;—&#x27;}&lt;br&gt;&lt;span style=&quot;color:var(--dim)&quot;&gt;avg1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;run-laps&quot;&gt;${runValidLapCount(r)}L&lt;/div&gt;
        &lt;div class=&quot;run-best ${bestCls}&quot;&gt;${bestVal}&lt;/div&gt;
      &lt;/div&gt;`;
    }).join(&#x27;&#x27;);

    const comments=s.runs.filter(r=&gt;r.comment).map(r=&gt;
      `&lt;div class=&quot;comment&quot;&gt;&lt;span class=&quot;comment-no&quot;&gt;R${r.no}&lt;/span&gt;${r.comment}&lt;/div&gt;`
    ).join(&#x27;&#x27;);

    return `&lt;div class=&quot;session-card&quot; style=&quot;--cc:${driverColor(s.driver)}&quot;&gt;
      &lt;div class=&quot;session-head&quot;&gt;
        &lt;div class=&quot;session-driver&quot;&gt;${s.driver}&lt;/div&gt;
        &lt;div class=&quot;session-date&quot;&gt;
          &lt;span&gt;${s.date}, 2026 · ${s.car}&lt;/span&gt;
          &lt;span class=&quot;tagpill track&quot;&gt;${s.track.replace(&#x27;Sonoma_&#x27;,&#x27;&#x27;)}&lt;/span&gt;
          &lt;span class=&quot;tagpill ${s.sim.toLowerCase()}&quot;&gt;${s.sim}&lt;/span&gt;
          ${s.tire?`&lt;span class=&quot;tagpill tire&quot;&gt;${s.tire}&lt;/span&gt;`:&#x27;&#x27;}
          ${grip?&#x27;&lt;span class=&quot;tagpill grip&quot;&gt;+5% grip&lt;/span&gt;&#x27;:&#x27;&#x27;}
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;session-meta&quot;&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Runs&lt;/div&gt;&lt;div class=&quot;sm-v&quot;&gt;${s.runs.length}&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Valid Laps&lt;/div&gt;&lt;div class=&quot;sm-v&quot;&gt;${sessionValidLaps(s)}&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Best Clean&lt;/div&gt;&lt;div class=&quot;sm-v&quot; style=&quot;color:${grip?driverColor(s.driver):&#x27;var(--accent)&#x27;}&quot;&gt;${sBest!=null?sBest.toFixed(2):&#x27;—&#x27;}&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      ${grip?`&lt;div class=&quot;note-banner grip&quot;&gt;▲ All ${s.driver.split(&#x27; &#x27;).pop()} sessions carry +5% artificial grip — excluded from headline comparisons.&lt;/div&gt;`:&#x27;&#x27;}
      &lt;div class=&quot;runs&quot;&gt;${runsHtml}&lt;/div&gt;
      ${comments?`&lt;div class=&quot;comments-block&quot;&gt;${comments}&lt;/div&gt;`:&#x27;&#x27;}
    &lt;/div&gt;`;
  }).join(&#x27;&#x27;);
  g.innerHTML=cards || `&lt;div style=&quot;font-family:var(--mono);font-size:12px;color:var(--dim);padding:20px&quot;&gt;No sessions match this filter.&lt;/div&gt;`;
}

<script>
(function(){
  const PW='joegibbs';
  const gate=document.getElementById('gate');
  const app=document.getElementById('app');
  const input=document.getElementById('gateinput');
  const btn=document.getElementById('gatebtn');
  const err=document.getElementById('gateerr');

  const tabs=[...document.querySelectorAll('.track-tab')];
  const panels=[...document.querySelectorAll('.track-panel')];
  const loaded=new Set();

  // number the tabs from each tab's data-num
  tabs.forEach((t)=>{
    const n=t.dataset.num || '';
    t.innerHTML='<span class="idx">'+n+'</span>'+t.textContent;
  });

  function loadFrame(key){
    if(loaded.has(key)) return;
    const panel=document.querySelector('.track-panel[data-tab="'+key+'"]');
    const frame=panel.querySelector('.track-frame');
    frame.srcdoc=frame.dataset.srcdoc;
    frame.removeAttribute('data-srcdoc');
    loaded.add(key);
  }

  function activate(key){
    tabs.forEach(t=>{
      const on=t.dataset.tab===key;
      t.classList.toggle('active',on);
      t.setAttribute('aria-selected',on?'true':'false');
    });
    panels.forEach(p=>p.classList.toggle('active',p.dataset.tab===key));
    loadFrame(key);
    try{ location.hash=key; }catch(e){}
  }

  tabs.forEach(t=>{
    t.addEventListener('click',()=>activate(t.dataset.tab));
    t.addEventListener('keydown',e=>{
      const i=tabs.indexOf(t);
      if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
        e.preventDefault();
        const d=e.key==='ArrowRight'?1:-1;
        const next=tabs[(i+d+tabs.length)%tabs.length];
        next.focus(); activate(next.dataset.tab);
      }
    });
  });

  function firstTab(){
    const h=(location.hash||'').replace('#','');
    return tabs.some(t=>t.dataset.tab===h)?h:tabs[0].dataset.tab;
  }

  function reveal(){
    gate.classList.add('hidden');
    app.classList.remove('hidden');
    activate(firstTab());
  }

  try{ if(sessionStorage.getItem('rc2026_auth')==='1'){ reveal(); return; } }catch(e){}

  function attempt(){
    if(input.value.trim().toLowerCase()===PW){
      try{ sessionStorage.setItem('rc2026_auth','1'); }catch(e){}
      reveal();
    }else{
      err.textContent='Incorrect password.';
      gate.classList.add('shake');
      setTimeout(()=>gate.classList.remove('shake'),420);
      input.value=''; input.focus();
    }
  }
  btn.addEventListener('click',attempt);
  input.addEventListener('keydown',e=>{ if(e.key==='Enter') attempt(); });
  input.focus();
})();
</script>
