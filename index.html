<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Road Course Simulator Laptime Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06080d; --panel:#0e131c; --panel2:#141a26; --line:#212a38; --line2:#2d3a4c;
    --txt:#eef1f6; --muted:#94a1b2; --dim:#5d6b7d;
    --accent:#e6b84f;
    --mono:'Barlow Condensed',sans-serif;
    --cond:'Barlow Condensed',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--cond); background:var(--bg); color:var(--txt);
    -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; min-height:100vh;
    background-image:
      radial-gradient(1100px 500px at 90% -12%,rgba(230,184,79,.055),transparent 62%),
      radial-gradient(900px 520px at -5% 108%,rgba(66,150,212,.045),transparent 60%);
    background-attachment:fixed;
  }

  /* ===== TOP BAR ===== */
  .topbar{
    position:sticky; top:0; z-index:40;
    background:linear-gradient(180deg,rgba(14,19,28,.97),rgba(14,19,28,.88));
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line2);
  }
  .topbar::after{
    content:""; position:absolute; left:0; right:0; bottom:0; height:2px;
    background:linear-gradient(90deg,var(--accent),transparent 55%);
  }
  .brandrow{
    display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
    padding:18px 30px 0; flex-wrap:wrap;
  }
  .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:1.5px;
    color:var(--accent); text-transform:uppercase; font-weight:500;
  }
  h1{
    font-family:var(--cond); font-weight:900; font-size:30px; line-height:.95;
    letter-spacing:.4px; text-transform:uppercase; margin-top:5px;
  }
  h1 em{font-style:normal; color:var(--muted); font-weight:600}
  .brand-right{
    font-family:var(--mono); font-size:10.5px; letter-spacing:1px; color:var(--dim);
    text-transform:uppercase; text-align:right; line-height:1.7; padding-bottom:3px;
  }
  .brand-right b{color:var(--muted); font-weight:600}

  /* ===== TABS ===== */
  .track-tabs{
    display:flex; gap:2px; padding:14px 30px 0; flex-wrap:wrap;
  }
  .track-tab{
    font-family:var(--cond); font-weight:700; font-size:17px; letter-spacing:.4px;
    text-transform:uppercase; color:var(--muted);
    background:transparent; border:none; border-bottom:2px solid transparent;
    padding:9px 18px 11px; cursor:pointer; transition:.15s; position:relative;
    white-space:nowrap;
  }
  .track-tab .idx{
    font-family:var(--mono); font-size:10.5px; color:var(--dim); font-weight:500;
    margin-right:7px; letter-spacing:1px; vertical-align:2px;
  }
  .track-tab:hover{color:var(--txt)}
  .track-tab:hover .idx{color:var(--muted)}
  .track-tab.active{color:var(--txt); border-bottom-color:var(--accent)}
  .track-tab.active .idx{color:var(--accent)}
  .track-tab:focus-visible{outline:2px solid var(--accent); outline-offset:-2px; border-radius:4px}

  /* ===== PANELS ===== */
  .stage{flex:1; display:flex; flex-direction:column; min-height:0}
  .track-panel{flex:1; display:none}
  .track-panel.active{display:flex; flex-direction:column}
  .track-frame{
    flex:1; width:100%; border:none; display:block; min-height:calc(100vh - 132px);
    background:var(--bg);
  }

  /* ===== GATE ===== */
  .gate{
    position:fixed; inset:0; z-index:9999;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(900px 520px at 50% -8%,rgba(230,184,79,.07),transparent 62%),var(--bg);
  }
  .gate.hidden{display:none}
  .gatebox{
    width:min(400px,90vw); background:var(--panel); border:1px solid var(--line2);
    border-radius:12px; padding:40px 36px; text-align:center; position:relative; overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.6);
  }
  .gatebox::before{
    content:""; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,var(--accent),transparent 68%);
  }
  .gatebrand{
    font-family:var(--mono); font-size:11px; letter-spacing:1.5px; color:var(--accent);
    text-transform:uppercase; line-height:1.9; margin-bottom:16px; opacity:.85;
  }
  .gatetitle{
    font-family:var(--cond); font-size:34px; font-weight:900; text-transform:uppercase;
    line-height:.92; letter-spacing:.3px;
  }
  .gatetitle em{font-style:normal; color:var(--accent); display:block; font-size:22px; margin-top:4px}
  .gatesub{
    font-family:var(--mono); font-size:10.5px; letter-spacing:1.6px; color:var(--muted);
    text-transform:uppercase; margin:13px 0 26px;
  }
  .gateinput{
    width:100%; background:var(--panel2); border:1px solid var(--line2); border-radius:7px;
    color:var(--txt); font-family:var(--mono); font-size:16px; padding:14px 16px;
    letter-spacing:4px; outline:none; text-align:center; transition:.15s;
  }
  .gateinput:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(230,184,79,.13)}
  .gateinput::placeholder{letter-spacing:2px; opacity:.4}
  .gatebtn{
    width:100%; margin-top:12px; background:var(--accent); color:#0a0c00; border:none;
    border-radius:7px; font-family:var(--cond); font-weight:800; font-size:17px;
    letter-spacing:2px; text-transform:uppercase; padding:13px; cursor:pointer; transition:.15s;
  }
  .gatebtn:hover{filter:brightness(1.08)}
  .gateerr{
    min-height:18px; margin-top:12px; font-family:var(--mono); font-size:11px;
    color:#e25555; letter-spacing:.5px;
  }
  .gate.shake .gatebox{animation:shk .4s}
  @keyframes shk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

  .app.hidden{display:none}

  @media (max-width:680px){
    .brandrow{padding:14px 18px 0}
    h1{font-size:23px}
    .brand-right{display:none}
    .track-tabs{padding:12px 12px 0; gap:0; overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch; scrollbar-width:none}
    .track-tabs::-webkit-scrollbar{display:none}
    .track-tab{font-size:15px; padding:8px 13px 10px}
    .track-frame{min-height:calc(100vh - 118px)}
  }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gatebox">
    <div class="gatebrand">Toyota Racing Development<br>Joe Gibbs Racing</div>
    <div class="gatetitle">2026 Road Course<em>Simulator Laptime Tracker</em></div>
    <div class="gatesub">Enter password to continue</div>
    <input type="password" class="gateinput" id="gateinput" placeholder="Password" autocomplete="off">
    <button class="gatebtn" id="gatebtn">Unlock</button>
    <div class="gateerr" id="gateerr"></div>
  </div>
</div>

<div class="app hidden" id="app">
  <div class="topbar">
    <div class="brandrow">
      <div>
        <div class="eyebrow">Toyota Racing Development · Joe Gibbs Racing</div>
        <h1>2026 Road Course Simulator <em>· Laptime Tracker</em></h1>
      </div>
      <div class="brand-right">
        <b>4 Tracks</b> · Simulator Program<br>
        COTA · Watkins Glen · San Diego · Sonoma
      </div>
    </div>
    <div class="track-tabs" role="tablist" aria-label="Track selection">
      <button class="track-tab" data-tab="cota" data-num="03" role="tab" aria-selected="false" aria-controls="panel-cota">COTA</button>
      <button class="track-tab" data-tab="watkins" data-num="13" role="tab" aria-selected="false" aria-controls="panel-watkins">Watkins Glen</button>
      <button class="track-tab" data-tab="sandiego" data-num="18" role="tab" aria-selected="false" aria-controls="panel-sandiego">San Diego</button>
      <button class="track-tab" data-tab="sonoma" data-num="19" role="tab" aria-selected="false" aria-controls="panel-sonoma">Sonoma</button>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="track-panel" id="panel-cota" role="tabpanel" data-tab="cota"><iframe class="track-frame" data-srcdoc="&lt;!DOCTYPE html&gt;
&lt;html lang=&quot;en&quot;&gt;
&lt;head&gt;
&lt;script&gt;try{sessionStorage.setItem(&#x27;cota_auth&#x27;,&#x27;1&#x27;);}catch(e){}&lt;/script&gt;
&lt;meta charset=&quot;UTF-8&quot;&gt;
&lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;&gt;
&lt;title&gt;COTA — Lap Time Analysis&lt;/title&gt;
&lt;link rel=&quot;preconnect&quot; href=&quot;https://fonts.googleapis.com&quot;&gt;
&lt;link rel=&quot;preconnect&quot; href=&quot;https://fonts.gstatic.com&quot; crossorigin&gt;
&lt;link href=&quot;https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&amp;display=swap&quot; rel=&quot;stylesheet&quot;&gt;
&lt;script src=&quot;https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;style&gt;
:root{
  --bg:#0a0d12; --panel:#11151c; --panel2:#161b24; --line:#222a35; --line2:#2d3744;
  --txt:#eef1f6; --muted:#94a1b2; --dim:#5d6b7d;
  --accent:#e6b84f; /* gold — overall best */
  --saw:#a472e8;   /* William Sawalich — purple */
  --crews:#f0883e; /* Brent Crews — orange */
  --jones:#e25555; /* Brandon Jones — red */
  --gray:#4fc88a;  /* Taylor Gray — green */
  --hawk:#42c5d4;  /* Jack Hawksworth — cyan */
  --koch:#e26fc8;  /* Blake Koch — fuchsia */
  --gt12:#ec6ea0;  /* GT12 platform — pink */
  --mono:&#x27;Barlow Condensed&#x27;,sans-serif;
  --cond:&#x27;Barlow Condensed&#x27;,sans-serif;
  --radius:10px; --radius-sm:6px;
}
body.light{
  --bg:#eef1f5; --panel:#ffffff; --panel2:#f5f7fa; --line:#dde3ec; --line2:#c4cedb;
  --txt:#10151c; --muted:#52607e; --dim:#8492a3;
  --accent:#b8860b; --saw:#7d4fc8; --crews:#d2691e; --jones:#c0392b; --gray:#0c9e72; --hawk:#1789a0; --koch:#c0398f; --gt12:#d6437f;
}
*{box-sizing:border-box;margin:0;padding:0;font-variant-numeric:tabular-nums}
html,body{height:100%}
html{overflow-x:hidden}
body{max-width:100%}
body{
  font-family:var(--cond); background:var(--bg); color:var(--txt); font-size:16px; line-height:1.45;
  -webkit-font-smoothing:antialiased; letter-spacing:.2px;
  background-image:
    radial-gradient(900px 500px at 88% -10%,rgba(230,184,79,.05),transparent 60%),
    radial-gradient(800px 500px at 0% 110%,rgba(164,114,232,.04),transparent 60%);
  background-attachment:fixed; transition:background-color .25s,color .25s;
}
::selection{background:var(--accent);color:#0a0c00}
.main{max-width:1480px;margin:0 auto;padding:0 0 60px}

/* ===== HEADER ===== */
.header{position:relative;padding:34px 32px 26px;border-bottom:1px solid var(--line);overflow:hidden;
  background:linear-gradient(180deg,var(--panel2),transparent 90%)}
.header::after{content:&quot;&quot;;position:absolute;left:0;right:0;bottom:0;height:2px;
  background:linear-gradient(90deg,var(--accent),transparent 60%)}
.header-top{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
.header-top&gt;div:first-child{flex:1 1 auto;min-width:0}
.header-stats{flex:0 0 auto;align-self:flex-end}
.eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;color:var(--accent);text-transform:uppercase;font-weight:500}
h1{font-family:var(--cond);font-weight:900;font-size:58px;line-height:.9;letter-spacing:.3px;text-transform:uppercase;margin-top:8px}
h1 em{font-style:normal;color:var(--muted);font-weight:600;display:block}
.header-meta{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.header-meta-item{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px;
  padding:4px 10px;border:1px solid var(--line2);border-radius:20px}
.header-stats{display:flex;gap:0;flex-wrap:nowrap}
.hstat{padding:4px 22px;border-left:1px solid var(--line2);text-align:right}
.hstat:first-child{border-left:none}
.hstat-val{font-family:var(--cond);font-weight:800;font-size:40px;line-height:1;letter-spacing:.5px}
.hstat-label{font-family:var(--mono);font-size:11.5px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:5px}
.themebtn{position:absolute;top:24px;right:32px;background:var(--panel2);border:1px solid var(--line2);color:var(--muted);
  width:34px;height:34px;border-radius:var(--radius-sm);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.18s;z-index:5}
.themebtn:hover{color:var(--accent);border-color:var(--accent)}

.content{padding:28px 32px 0}
.section-label{font-family:var(--mono);font-size:11.5px;letter-spacing:1.2px;color:var(--dim);text-transform:uppercase;
  margin:36px 0 14px;display:flex;align-items:center;gap:12px;font-weight:500}
.section-label::after{content:&quot;&quot;;flex:1;height:1px;background:var(--line)}
.section-label:first-child{margin-top:0}

/* ===== SUMMARY ===== */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.summary-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden}
.summary-card-bar{position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.summary-label{font-family:var(--mono);font-size:11.5px;letter-spacing:1.2px;color:var(--dim);text-transform:uppercase}
.summary-val{font-family:var(--cond);font-weight:800;font-size:34px;line-height:1.05;margin-top:6px;letter-spacing:.5px}
.summary-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5}

/* ===== CHARTS ===== */
.chart-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px 16px;margin-bottom:18px}
.chart-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.chart-title{font-family:var(--cond);font-weight:700;font-size:21px;letter-spacing:.4px;text-transform:uppercase}
.chart-sub{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.3px;text-align:right;max-width:60%;line-height:1.6}
.chart-wrap{height:320px;position:relative}

/* ===== LEGEND ===== */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.legend-item{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:.5px;
  padding:7px 13px;border:1px solid var(--line2);border-radius:20px;text-transform:uppercase;color:var(--muted)}
.legend-dot{width:9px;height:9px;border-radius:50%}

/* ===== DRIVER COUNTERS ===== */
.counter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.counter{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.counter::before{content:&quot;&quot;;position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--cc,var(--muted))}
.counter-name{font-family:var(--cond);font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:.3px;padding-left:6px}
.counter-laps{font-family:var(--cond);font-weight:800;font-size:30px;line-height:1;margin-top:6px;padding-left:6px}
.counter-laps small{font-family:var(--mono);font-size:11px;color:var(--dim);font-weight:400;margin-left:4px}
.counter-sub{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:6px;padding-left:6px;letter-spacing:.4px}

/* ===== FILTERS ===== */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.filter-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.filter-glabel{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-right:2px}
.filter-btn{font-family:var(--mono);font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);
  background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:6px 13px;cursor:pointer;transition:.15s}
.filter-btn:hover{border-color:var(--muted);color:var(--txt)}
.filter-btn.active{background:var(--txt);color:var(--bg);border-color:var(--txt);font-weight:700}
.filter-sep{width:1px;align-self:stretch;background:var(--line);margin:2px 6px}

/* ===== SESSION CARDS ===== */
.sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.session-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.session-head{padding:14px 16px;border-bottom:1px solid var(--line);position:relative}
.session-head::before{content:&quot;&quot;;position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--cc,var(--muted))}
.session-driver{font-family:var(--cond);font-weight:800;font-size:21px;text-transform:uppercase;letter-spacing:.3px;line-height:1}
.session-date{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tagpill{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.6px;padding:2px 7px;border-radius:3px;text-transform:uppercase;border:1px solid transparent}
.tagpill.gt12{background:rgba(236,110,160,.16);color:var(--gt12);border-color:rgba(236,110,160,.4)}
.tagpill.gtx{background:rgba(148,161,178,.14);color:var(--muted);border-color:var(--line2)}
.tagpill.grip{background:rgba(79,200,138,.14);color:var(--gray);border-color:rgba(79,200,138,.4)}
.tagpill.tire{background:rgba(230,184,79,.12);color:var(--accent);border-color:rgba(230,184,79,.35)}
.tagpill.track{background:rgba(66,197,212,.12);color:var(--hawk);border-color:rgba(66,197,212,.35)}
.session-meta{display:flex;gap:14px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel2)}
.sm-item{display:flex;flex-direction:column}
.sm-k{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.sm-v{font-family:var(--cond);font-weight:700;font-size:18px;margin-top:2px}
.note-banner{font-family:var(--mono);font-size:11px;line-height:1.5;padding:9px 16px;background:rgba(230,184,79,.08);
  border-bottom:1px solid var(--line);color:var(--accent);letter-spacing:.3px;display:flex;gap:8px}
.note-banner.grip{background:rgba(79,200,138,.07);color:var(--gray)}
.runs{padding:6px 16px 12px}
.run{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.run:last-child{border-bottom:none}
.run-no{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:34px;font-weight:600}
.run-body{flex:1;min-width:0}
.run-desc{font-family:var(--cond);font-weight:600;font-size:15px;line-height:1.15;letter-spacing:.2px}
.run-tire{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.run-best{font-family:var(--cond);font-weight:800;font-size:20px;min-width:62px;text-align:right;letter-spacing:.3px}
.run-best.session-best{color:var(--gray)}
.run-best.outlier{color:var(--dim);text-decoration:line-through;text-decoration-thickness:1px}
.run-avg{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:54px;text-align:right}
.run-laps{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:30px;text-align:right}
.comments-block{padding:0 16px 14px;margin-top:auto}
.comment{font-family:var(--cond);font-size:13.5px;line-height:1.4;color:var(--muted);padding:8px 0;border-top:1px dashed var(--line2)}
.comment-no{font-family:var(--mono);font-size:11.5px;color:var(--dim);letter-spacing:.5px;margin-right:5px}

/* ===== LOCK GATE ===== */
.lockgate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(900px 500px at 50% -10%,rgba(230,184,79,.07),transparent 60%),var(--bg)}
.lockbox{width:min(360px,90vw);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:34px 30px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.lockbrand{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;color:var(--accent);margin-bottom:12px;text-transform:uppercase;line-height:1.8}
.locktitle{font-family:var(--cond);font-size:30px;font-weight:900;text-transform:uppercase;margin:0 0 4px}
.locksub{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;color:var(--muted);margin:0 0 22px;text-transform:uppercase}
.lockinput{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:8px;color:var(--txt);font-family:var(--mono);font-size:15px;padding:13px 14px;letter-spacing:1px;outline:none;transition:.15s}
.lockinput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,184,79,.15)}
.lockbtn{width:100%;margin-top:14px;background:var(--accent);color:#0b0b0b;border:none;border-radius:8px;font-family:var(--cond);font-weight:800;font-size:16px;letter-spacing:1px;text-transform:uppercase;padding:13px;cursor:pointer;transition:.15s}
.lockbtn:hover{filter:brightness(1.08)}
.lockerr{min-height:18px;margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--jones)}
.lockgate.shake .lockbox{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.app-hidden{display:none}

@media(max-width:720px){
  h1{font-size:42px}
  .header{padding:24px 18px 20px}
  .eyebrow{padding-right:44px}            /* clear the theme toggle button */
  .themebtn{top:20px;right:18px}
  .content{padding:22px 18px 0}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .header-stats{margin-top:16px}
  .hstat{padding:4px 14px}
  .hstat-val{font-size:34px}
  .chart-wrap{height:260px}
  .chart-card{padding:16px 14px 12px}
  .counter-grid{grid-template-columns:repeat(2,1fr)}
  .chart-title{font-size:19px}
  .chart-sub{max-width:100%;text-align:left}
  .sessions-grid{grid-template-columns:1fr}
  .run{gap:8px}
  .run-avg{min-width:46px;font-size:10.5px}
  .run-laps{min-width:26px;font-size:10.5px}
  .run-best{min-width:54px;font-size:18px}
  .run-desc{font-size:14px}
  .filters{gap:6px}
  .filter-sep{display:none}               /* dividers float when groups wrap; hide on mobile */
  .filter-group{width:100%}               /* each filter group on its own row */
}

/* =================== DERIVED =================== */
const DRIVERS_PRESENT = [...new Set(SESSIONS.map(s=&gt;s.driver))]
  .sort((a,b)=&gt;Object.keys(DRIVER_META).indexOf(a)-Object.keys(DRIVER_META).indexOf(b));

function cssVar(v){ return getComputedStyle(document.documentElement).getPropertyValue(v.replace(/var\(|\)/g,&#x27;&#x27;).trim()).trim(); }
function driverColor(d){ return DRIVER_META[d].color; }              // for CSS (e.g. style=&quot;color:var(--crews)&quot;)
function driverHex(d){ return cssVar(DRIVER_META[d].color); }        // resolved hex for canvas/Chart.js
function isGrip(d){ return !!DRIVER_META[d].grip; }

/* valid laps = times below outlier threshold; cleanBest = min valid time */

function runValidTimes(run){ return run.times.filter(t=&gt;t&lt;OUTLIER); }
function runCleanBest(run){ const v=runValidTimes(run); return v.length?Math.min(...v):null; }
function runCleanAvg(run){ const v=runValidTimes(run); return v.length? v.reduce((a,b)=&gt;a+b,0)/v.length : null; }
function runValidLapCount(run){ return runValidTimes(run).length; }

function sessionCleanBest(s){
  let best=null;
  s.runs.forEach(r=&gt;{ const b=runCleanBest(r); if(b!==null &amp;&amp; (best===null||b&lt;best)) best=b; });
  return best;
}
function sessionValidLaps(s){ return s.runs.reduce((n,r)=&gt;n+runValidLapCount(r),0); }

/* total valid laps across all sessions */
const TOTAL_VALID = SESSIONS.reduce((n,s)=&gt;n+sessionValidLaps(s),0);

/* clean best excluding grip-flagged drivers (headline) */
let cleanBest={time:Infinity,driver:null,session:null,run:null};
let gripBest={time:Infinity,driver:null,session:null,run:null};
SESSIONS.forEach(s=&gt;{
  s.runs.forEach(r=&gt;{
    const b=runCleanBest(r); if(b===null) return;
    const target=isGrip(s.driver)?gripBest:cleanBest;
    if(b&lt;target.time){ target.time=b; target.driver=s.driver; target.session=s.date; target.run=r.no; }
  });
});

function renderSummary(){
  const g=document.getElementById(&#x27;summary-grid&#x27;);
  const cards=[];

  // headline overall best (no grip exclusion — all drivers valid)
  if(cleanBest.driver){
    cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-label&quot;&gt;Best Clean Lap&lt;/div&gt;
      &lt;div class=&quot;summary-val&quot; style=&quot;color:${driverColor(cleanBest.driver)}&quot;&gt;${cleanBest.time.toFixed(2)}&lt;/div&gt;
      &lt;div class=&quot;summary-sub&quot;&gt;${cleanBest.driver} · ${cleanBest.session} Run ${cleanBest.run}&lt;br&gt;off-pace laps excluded&lt;/div&gt;&lt;/div&gt;`);
  }

  // best run avg (lowest avg 1st-lap across valid runs)
  let bestAvg={time:Infinity,driver:null,session:null,run:null};
  SESSIONS.forEach(s=&gt;s.runs.forEach(r=&gt;{
    if(runCleanBest(r)===null||r.avg1&gt;=OUTLIER) return;
    if(r.avg1&lt;bestAvg.time){ bestAvg={time:r.avg1,driver:s.driver,session:s.date,run:r.no}; }
  }));
  if(bestAvg.driver){
    cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot; style=&quot;background:${driverColor(bestAvg.driver)}&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-label&quot;&gt;Best Run Avg&lt;/div&gt;
      &lt;div class=&quot;summary-val&quot; style=&quot;color:${driverColor(bestAvg.driver)}&quot;&gt;${bestAvg.time.toFixed(2)}&lt;/div&gt;
      &lt;div class=&quot;summary-sub&quot;&gt;${bestAvg.driver} · ${bestAvg.session} Run ${bestAvg.run}&lt;br&gt;avg of 1st 3 laps&lt;/div&gt;&lt;/div&gt;`);
  }

  // drivers count
  cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot; style=&quot;background:var(--muted)&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;summary-label&quot;&gt;Drivers&lt;/div&gt;
    &lt;div class=&quot;summary-val&quot;&gt;${DRIVERS_PRESENT.length}&lt;/div&gt;
    &lt;div class=&quot;summary-sub&quot;&gt;${DRIVERS_PRESENT.map(d=&gt;d.split(&#x27; &#x27;).pop()).join(&#x27; · &#x27;)}&lt;/div&gt;&lt;/div&gt;`);

  // dominant finding
  cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot; style=&quot;background:var(--jones)&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;summary-label&quot;&gt;Dominant Finding&lt;/div&gt;
    &lt;div class=&quot;summary-val&quot; style=&quot;font-size:26px&quot;&gt;Too Tight&lt;/div&gt;
    &lt;div class=&quot;summary-sub&quot;&gt;Cross-driver: car runs tight on entry &amp;amp; mid-corner, lacking forward drive off slow-speed corners&lt;/div&gt;&lt;/div&gt;`);

  g.innerHTML=cards.join(&#x27;&#x27;);
}

/* ===== RACE DAY designation on Best Lap chart ===== */
const RACE_SORT = 20260228;          // race date in YYYYMMDD
const RACE_LABEL = &#x27;Feb 28&#x27;;      // human-readable race date
const raceDayPlugin = {
  id:&#x27;raceDay&#x27;,
  beforeDatasetsDraw(chart){
    const ordered=[...SESSIONS].sort((a,b)=&gt;a.dateSort-b.dateSort);
    // index of first post-race session
    let firstPost=-1;
    for(let i=0;i&lt;ordered.length;i++){ if(ordered[i].dateSort&gt;RACE_SORT){ firstPost=i; break; } }
    const {ctx,chartArea:{top,bottom,right},scales:{x}}=chart;
    const accent=cssVar(&#x27;--accent&#x27;);
    // boundary x: midway between last pre-race and first post-race point;
    // if no post-race sessions, pin the line just inside the right edge.
    let bx;
    if(firstPost===-1){ bx=right; }
    else if(firstPost===0){ bx=x.getPixelForValue(0)-12; }
    else { bx=(x.getPixelForValue(firstPost-1)+x.getPixelForValue(firstPost))/2; }
    ctx.save();
    // shade post-race band
    if(firstPost!==-1){
      ctx.fillStyle=accent; ctx.globalAlpha=0.06;
      ctx.fillRect(bx,top,right-bx,bottom-top);
      ctx.globalAlpha=1;
    }
    // vertical dashed race-day line
    ctx.strokeStyle=accent; ctx.globalAlpha=0.9; ctx.lineWidth=1.5;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(bx,top); ctx.lineTo(bx,bottom); ctx.stroke();
    ctx.setLineDash([]);
    // label
    ctx.globalAlpha=1; ctx.fillStyle=accent;
    ctx.font=&#x27;600 9px Barlow Condensed, sans-serif&#x27;;
    ctx.textBaseline=&#x27;top&#x27;;
    const txt=&#x27;RACE DAY · &#x27;+RACE_LABEL;
    if(firstPost===-1){
      // all sessions pre-race: label sits left of the right-edge line, rotated
      ctx.save();
      ctx.translate(bx-4,top+24); ctx.rotate(0);
      ctx.textAlign=&#x27;right&#x27;;
      ctx.fillText(txt,0,0);
      ctx.fillStyle=cssVar(&#x27;--dim&#x27;); ctx.font=&#x27;400 8px Barlow Condensed, sans-serif&#x27;;
      ctx.fillText(&#x27;(all sessions pre-race)&#x27;,0,12);
      ctx.restore();
    } else {
      ctx.textAlign=&#x27;left&#x27;;
      ctx.fillText(txt,bx+5,top+24);
      ctx.fillStyle=cssVar(&#x27;--dim&#x27;); ctx.font=&#x27;400 8px Barlow Condensed, sans-serif&#x27;;
      ctx.fillText(&#x27;post-race sessions →&#x27;,bx+5,top+36);
    }
    ctx.restore();
  }
};


/* ===== TRACK TIMELINE: version segments band across the top of the Best Lap chart ===== */
const TL_PALETTE = [&#x27;--dim&#x27;,&#x27;--hawk&#x27;,&#x27;--accent&#x27;,&#x27;--koch&#x27;,&#x27;--saw&#x27;,&#x27;--crews&#x27;];
const trackTimelinePlugin = {
  id:&#x27;trackTimeline&#x27;,
  beforeDatasetsDraw(chart){
    const ordered=[...SESSIONS].filter(s=&gt;!isGrip(s.driver)).sort((a,b)=&gt;a.dateSort-b.dateSort);
    if(!ordered.length) return;
    const {ctx,chartArea:{top,left,right},scales:{x}}=chart;
    const versions=ordered.map(s=&gt;s.track.replace(&#x27;COTA_&#x27;,&#x27;&#x27;).replace(/_AltSF$/,&#x27;&#x27;));
    const segs=[]; let start=0;
    for(let i=1;i&lt;=versions.length;i++){
      if(i===versions.length || versions[i]!==versions[start]){
        segs.push({ver:versions[start], from:start, to:i-1}); start=i;
      }
    }
    // assign a stable color per distinct version (first-seen order)
    const verColor={}; let ci=0;
    segs.forEach(s=&gt;{ if(!(s.ver in verColor)){ verColor[s.ver]=TL_PALETTE[ci%TL_PALETTE.length]; ci++; } });
    const bandH=14, bandTop=top+2;
    ctx.save();
    segs.forEach(seg=&gt;{
      const x0 = seg.from===0 ? left : (x.getPixelForValue(seg.from-1)+x.getPixelForValue(seg.from))/2;
      const x1 = seg.to===versions.length-1 ? right : (x.getPixelForValue(seg.to)+x.getPixelForValue(seg.to+1))/2;
      const col = cssVar(verColor[seg.ver]||&#x27;--muted&#x27;);
      ctx.globalAlpha=0.16; ctx.fillStyle=col; ctx.fillRect(x0,bandTop,x1-x0,bandH); ctx.globalAlpha=1;
      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x0,bandTop); ctx.lineTo(x1,bandTop); ctx.stroke();
      if(x1-x0&gt;34){
        ctx.fillStyle=col; ctx.font=&#x27;700 9px Barlow Condensed, sans-serif&#x27;;
        ctx.textBaseline=&#x27;middle&#x27;; ctx.textAlign=&#x27;center&#x27;;
        ctx.fillText(seg.ver, (x0+x1)/2, bandTop+bandH/2+0.5);
      }
    });
    ctx.restore();
  }
};

function buildBestChart(){
  const ctx=document.getElementById(&#x27;bestChart&#x27;);
  const tick=cssVar(&#x27;--dim&#x27;), grid=cssVar(&#x27;--line&#x27;), panel=cssVar(&#x27;--panel&#x27;);
  const ordered=[...SESSIONS].sort((a,b)=&gt;a.dateSort-b.dateSort);
  const labels=ordered.map(s=&gt;s.date);

  // one dataset per driver, points only where they ran
  const datasets=DRIVERS_PRESENT.map(d=&gt;{
    const data=ordered.map(s=&gt; s.driver===d ? sessionCleanBest(s) : null);
    const hex=driverHex(d);
    return {
      label:d, data,
      borderColor:hex, backgroundColor:hex,
      pointRadius:6, pointHoverRadius:8, pointBorderColor:panel, pointBorderWidth:2,
      borderWidth:2, spanGaps:true, tension:.25,
      borderDash:isGrip(d)?[5,4]:[]
    };
  });

  if(bestChartObj) bestChartObj.destroy();
  bestChartObj=new Chart(ctx,{
    type:&#x27;line&#x27;,
    data:{labels,datasets},
    plugins:[raceDayPlugin, trackTimelinePlugin],
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{padding:{top:22}},
      interaction:{mode:&#x27;nearest&#x27;,intersect:true},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:panel, borderColor:grid, borderWidth:1,
          titleColor:cssVar(&#x27;--txt&#x27;), bodyColor:cssVar(&#x27;--muted&#x27;), padding:10,
          callbacks:{
            title:(items)=&gt;{ const s=ordered[items[0].dataIndex]; return `${s.date} · ${s.driver}`; },
            label:(c)=&gt;` Best clean: ${c.raw!=null?c.raw.toFixed(2)+&#x27;s&#x27;:&#x27;—&#x27;}`
          }
        }
      },
      scales:{
        x:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}}, grid:{color:grid} },
        y:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:11},callback:v=&gt;v.toFixed(1)},
            grid:{color:grid},
            title:{display:true,text:&#x27;Best Lap (s)&#x27;,color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}} }
      }
    }
  });
}

/* =================== CHART 2: AVG 1ST LAP STRIP =================== */
function buildStripChart(){
  const ctx=document.getElementById(&#x27;stripChart&#x27;);
  const tick=cssVar(&#x27;--dim&#x27;), grid=cssVar(&#x27;--line&#x27;), panel=cssVar(&#x27;--panel&#x27;);

  // build one scatter point per run: x = driver index, y = avg1
  // exclude pure-outlier runs and race-pace runs whose avg1 is far off clean qualifying pace
  const points=[]; const ranges={};
  DRIVERS_PRESENT.forEach((d,i)=&gt;{ ranges[d]={vals:[],i}; });
  SESSIONS.forEach(s=&gt;{
    s.runs.forEach(r=&gt;{
      const cavg=runCleanAvg(r);             // mean of this run&#x27;s clean laps (off-laps excluded)
      if(cavg===null) return;                // skip runs with no clean laps
      const i=DRIVERS_PRESENT.indexOf(s.driver);
      const jitter=(Math.random()-0.5)*0.34;
      points.push({x:i+jitter, y:cavg, _d:s.driver, _s:s.date, _r:r.no});
      ranges[s.driver].vals.push(cavg);
    });
  });

  const scatter={
    type:&#x27;scatter&#x27;,
    data:{datasets:[{
      data:points,
      pointRadius:5, pointHoverRadius:7,
      backgroundColor:points.map(p=&gt;driverHex(p._d)),
      borderColor:panel, borderWidth:1
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:panel, borderColor:grid, borderWidth:1,
          titleColor:cssVar(&#x27;--txt&#x27;), bodyColor:cssVar(&#x27;--muted&#x27;), padding:10,
          callbacks:{
            title:(items)=&gt;{ const p=items[0].raw; return `${p._d}`; },
            label:(c)=&gt;` ${c.raw._s} Run ${c.raw._r}: ${c.raw.y.toFixed(2)}s`
          }
        }
      },
      scales:{
        x:{ min:-0.6, max:DRIVERS_PRESENT.length-0.4,
            ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10},stepSize:1,
              callback:(v)=&gt;{ const i=Math.round(v); return DRIVERS_PRESENT[i]?DRIVERS_PRESENT[i].split(&#x27; &#x27;).pop():&#x27;&#x27;; }},
            grid:{color:grid} },
        y:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:11},callback:v=&gt;v.toFixed(1)},
            grid:{color:grid},
            title:{display:true,text:&#x27;Avg Clean Lap (s)&#x27;,color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}} }
      }
    },
    plugins:[{
      id:&#x27;violin&#x27;,
      beforeDatasetsDraw(chart){
        const {ctx,scales:{x,y}}=chart;
        DRIVERS_PRESENT.forEach((d,i)=&gt;{
          const vals=ranges[d].vals; if(vals.length&lt;2) return;
          const col=driverHex(d);
          const sorted=[...vals].sort((a,b)=&gt;a-b);
          const mn=Math.min(...vals), mx=Math.max(...vals);
          const n=sorted.length;
          const mean=vals.reduce((a,b)=&gt;a+b,0)/n;
          const sd=Math.sqrt(vals.reduce((a,b)=&gt;a+(b-mean)*(b-mean),0)/n) || 0.4;
          const bw=Math.max(1.06*sd*Math.pow(n,-0.2), 0.18);
          const pad=bw*1.5;
          const lo=mn-pad, hi=mx+pad;
          const STEPS=48;
          const dens=[]; let maxD=0;
          for(let k=0;k&lt;=STEPS;k++){
            const v=lo+(hi-lo)*k/STEPS;
            let sum=0;
            for(let j=0;j&lt;n;j++){ const u=(v-sorted[j])/bw; sum+=Math.exp(-0.5*u*u); }
            const den=sum/(n*bw*Math.sqrt(2*Math.PI));
            dens.push({v,den}); if(den&gt;maxD) maxD=den;
          }
          if(maxD&lt;=0) return;
          const halfMax=0.40;
          const cx=x.getPixelForValue(i);
          const wpx=Math.abs(x.getPixelForValue(i+halfMax)-cx);
          ctx.save();
          ctx.beginPath();
          dens.forEach((p,idx)=&gt;{
            const py=y.getPixelForValue(p.v);
            const w=(p.den/maxD)*wpx;
            if(idx===0) ctx.moveTo(cx+w,py); else ctx.lineTo(cx+w,py);
          });
          for(let idx=dens.length-1; idx&gt;=0; idx--){
            const py=y.getPixelForValue(dens[idx].v);
            const w=(dens[idx].den/maxD)*wpx;
            ctx.lineTo(cx-w,py);
          }
          ctx.closePath();
          ctx.fillStyle=col; ctx.globalAlpha=0.16; ctx.fill();
          ctx.globalAlpha=0.55; ctx.strokeStyle=col; ctx.lineWidth=1.25; ctx.stroke();
          ctx.restore();
        });
      }
    },{
      id:&#x27;meanMarker&#x27;,
      afterDatasetsDraw(chart){
        const {ctx,scales:{x,y}}=chart;
        DRIVERS_PRESENT.forEach((d,i)=&gt;{
          const vals=ranges[d].vals; if(!vals.length) return;
          const mean=vals.reduce((a,b)=&gt;a+b,0)/vals.length;
          const px=x.getPixelForValue(i), py=y.getPixelForValue(mean);
          const col=driverHex(d);
          ctx.save();
          ctx.translate(px,py); ctx.rotate(Math.PI/4);
          ctx.fillStyle=col; ctx.strokeStyle=cssVar(&#x27;--txt&#x27;); ctx.lineWidth=1.5;
          const s=5;
          ctx.fillRect(-s,-s,2*s,2*s); ctx.strokeRect(-s,-s,2*s,2*s);
          ctx.restore();
        });
      }
    }]
  };
  if(stripChartObj) stripChartObj.destroy();
  stripChartObj=new Chart(ctx,scatter);
}

/* =================== RENDER: DRIVER COUNTERS =================== */
function renderCounters(){
  const g=document.getElementById(&#x27;counter-grid&#x27;);
  const byDriver={};
  DRIVERS_PRESENT.forEach(d=&gt;byDriver[d]={laps:0,runs:0,sessions:0});
  SESSIONS.forEach(s=&gt;{
    byDriver[s.driver].sessions++;
    s.runs.forEach(r=&gt;{ byDriver[s.driver].laps+=runValidLapCount(r); byDriver[s.driver].runs++; });
  });
  g.innerHTML=DRIVERS_PRESENT.map(d=&gt;{
    const b=byDriver[d];
    return `&lt;div class=&quot;counter&quot; style=&quot;--cc:${driverColor(d)}&quot;&gt;
      &lt;div class=&quot;counter-name&quot;&gt;${d}&lt;/div&gt;
      &lt;div class=&quot;counter-laps&quot; style=&quot;color:${driverColor(d)}&quot;&gt;${b.laps}&lt;small&gt;valid laps&lt;/small&gt;&lt;/div&gt;
      &lt;div class=&quot;counter-sub&quot;&gt;${b.sessions} session${b.sessions&gt;1?&#x27;s&#x27;:&#x27;&#x27;} · ${b.runs} runs${isGrip(d)?&#x27; · +5% grip&#x27;:&#x27;&#x27;}&lt;/div&gt;
    &lt;/div&gt;`;
  }).join(&#x27;&#x27;);
}

/* =================== RENDER: FILTERS =================== */
let activeDriver=&#x27;all&#x27;, activeSim=&#x27;all&#x27;, activeTire=&#x27;all&#x27;, activeTrack=&#x27;all&#x27;;
function renderFilters(){
  const tracks=[...new Set(SESSIONS.map(s=&gt;s.track))].sort();
  const sims=[...new Set(SESSIONS.map(s=&gt;s.sim))];
  const tires=[...new Set(SESSIONS.map(s=&gt;s.tire).filter(Boolean))];
  const f=document.getElementById(&#x27;filters&#x27;);
  let html=&#x27;&#x27;;
  if(tracks.length&gt;1){
    html+=`&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Track&lt;/span&gt;`;
    html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;track&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
    tracks.forEach(t=&gt;{ const short=t.replace(&#x27;COTA_&#x27;,&#x27;&#x27;); html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;track&quot; data-val=&quot;${t}&quot;&gt;${short}&lt;/button&gt;`; });
    html+=`&lt;/div&gt;&lt;div class=&quot;filter-sep&quot;&gt;&lt;/div&gt;`;
  }
  html+=`&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Driver&lt;/span&gt;`;
  html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;driver&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
  DRIVERS_PRESENT.forEach(d=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;driver&quot; data-val=&quot;${d}&quot;&gt;${d.split(&#x27; &#x27;).pop()}&lt;/button&gt;`; });
  html+=`&lt;/div&gt;&lt;div class=&quot;filter-sep&quot;&gt;&lt;/div&gt;&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Sim&lt;/span&gt;`;
  html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;sim&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
  sims.forEach(sm=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;sim&quot; data-val=&quot;${sm}&quot;&gt;${sm}&lt;/button&gt;`; });
  html+=`&lt;/div&gt;`;
  if(tires.length){
    html+=`&lt;div class=&quot;filter-sep&quot;&gt;&lt;/div&gt;&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Tire&lt;/span&gt;`;
    html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;tire&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
    tires.forEach(t=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;tire&quot; data-val=&quot;${t}&quot;&gt;${t}&lt;/button&gt;`; });
    html+=`&lt;/div&gt;`;
  }
  f.innerHTML=html;
  f.querySelectorAll(&#x27;.filter-btn&#x27;).forEach(btn=&gt;{
    btn.addEventListener(&#x27;click&#x27;,()=&gt;{
      const type=btn.dataset.type;
      f.querySelectorAll(`.filter-btn[data-type=&quot;${type}&quot;]`).forEach(b=&gt;b.classList.remove(&#x27;active&#x27;));
      btn.classList.add(&#x27;active&#x27;);
      if(type===&#x27;driver&#x27;) activeDriver=btn.dataset.val;
      else if(type===&#x27;sim&#x27;) activeSim=btn.dataset.val;
      else if(type===&#x27;track&#x27;) activeTrack=btn.dataset.val;
      else activeTire=btn.dataset.val;
      renderSessions();
    });
  });
}

/* =================== RENDER: SESSION CARDS =================== */
function renderSessions(){
  const g=document.getElementById(&#x27;sessions-grid&#x27;);
  const ordered=[...SESSIONS].sort((a,b)=&gt;a.dateSort-b.dateSort);
  const cards=ordered.filter(s=&gt;
    (activeDriver===&#x27;all&#x27;||s.driver===activeDriver) &amp;&amp;
    (activeSim===&#x27;all&#x27;||s.sim===activeSim) &amp;&amp;
    (activeTire===&#x27;all&#x27;||s.tire===activeTire) &amp;&amp;
    (activeTrack===&#x27;all&#x27;||s.track===activeTrack)
  ).map(s=&gt;{
    const sBest=sessionCleanBest(s);
    const grip=isGrip(s.driver);
    const runsHtml=s.runs.map(r=&gt;{
      const cb=runCleanBest(r);
      const allOutlier=cb===null;
      const isBest=cb!==null &amp;&amp; sBest!==null &amp;&amp; Math.abs(cb-sBest)&lt;1e-6;
      const bestCls=allOutlier?&#x27;outlier&#x27;:(isBest?&#x27;session-best&#x27;:&#x27;&#x27;);
      const bestVal=allOutlier?(r.times[0]!=null?r.times[0].toFixed(2):&#x27;—&#x27;):cb.toFixed(2);
      return `&lt;div class=&quot;run&quot;&gt;
        &lt;div class=&quot;run-no&quot;&gt;R${r.no}&lt;/div&gt;
        &lt;div class=&quot;run-body&quot;&gt;
          &lt;div class=&quot;run-desc&quot;&gt;${r.desc}&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;run-avg&quot;&gt;${r.avg1!=null?r.avg1.toFixed(2):&#x27;—&#x27;}&lt;br&gt;&lt;span style=&quot;color:var(--dim)&quot;&gt;avg1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;run-laps&quot;&gt;${runValidLapCount(r)}L&lt;/div&gt;
        &lt;div class=&quot;run-best ${bestCls}&quot;&gt;${bestVal}&lt;/div&gt;
      &lt;/div&gt;`;
    }).join(&#x27;&#x27;);

    const comments=s.runs.filter(r=&gt;r.comment).map(r=&gt;
      `&lt;div class=&quot;comment&quot;&gt;&lt;span class=&quot;comment-no&quot;&gt;R${r.no}&lt;/span&gt;${r.comment}&lt;/div&gt;`
    ).join(&#x27;&#x27;);

    return `&lt;div class=&quot;session-card&quot; style=&quot;--cc:${driverColor(s.driver)}&quot;&gt;
      &lt;div class=&quot;session-head&quot;&gt;
        &lt;div class=&quot;session-driver&quot;&gt;${s.driver}&lt;/div&gt;
        &lt;div class=&quot;session-date&quot;&gt;
          &lt;span&gt;${s.date}, 2026 · ${s.car}&lt;/span&gt;
          &lt;span class=&quot;tagpill track&quot;&gt;${s.track.replace(&#x27;COTA_&#x27;,&#x27;&#x27;)}&lt;/span&gt;
          &lt;span class=&quot;tagpill ${s.sim.toLowerCase()}&quot;&gt;${s.sim}&lt;/span&gt;
          ${s.tire?`&lt;span class=&quot;tagpill tire&quot;&gt;${s.tire}&lt;/span&gt;`:&#x27;&#x27;}
          ${grip?&#x27;&lt;span class=&quot;tagpill grip&quot;&gt;+5% grip&lt;/span&gt;&#x27;:&#x27;&#x27;}
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;session-meta&quot;&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Runs&lt;/div&gt;&lt;div class=&quot;sm-v&quot;&gt;${s.runs.length}&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Valid Laps&lt;/div&gt;&lt;div class=&quot;sm-v&quot;&gt;${sessionValidLaps(s)}&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Best Clean&lt;/div&gt;&lt;div class=&quot;sm-v&quot; style=&quot;color:${grip?driverColor(s.driver):&#x27;var(--accent)&#x27;}&quot;&gt;${sBest!=null?sBest.toFixed(2):&#x27;—&#x27;}&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      ${grip?`&lt;div class=&quot;note-banner grip&quot;&gt;▲ All ${s.driver.split(&#x27; &#x27;).pop()} sessions carry +5% artificial grip — excluded from headline comparisons.&lt;/div&gt;`:&#x27;&#x27;}
      &lt;div class=&quot;runs&quot;&gt;${runsHtml}&lt;/div&gt;
      ${comments?`&lt;div class=&quot;comments-block&quot;&gt;${comments}&lt;/div&gt;`:&#x27;&#x27;}
    &lt;/div&gt;`;
  }).join(&#x27;&#x27;);
  g.innerHTML=cards || `&lt;div style=&quot;font-family:var(--mono);font-size:12px;color:var(--dim);padding:20px&quot;&gt;No sessions match this filter.&lt;/div&gt;`;
}

/* =================== THEME =================== */
function rebuildCharts(){ buildBestChart(); buildStripChart(); }
document.getElementById(&#x27;themebtn&#x27;).addEventListener(&#x27;click&#x27;,()=&gt;{
  document.body.classList.toggle(&#x27;light&#x27;);
  try{ localStorage.setItem(&#x27;cota_theme&#x27;, document.body.classList.contains(&#x27;light&#x27;)?&#x27;light&#x27;:&#x27;dark&#x27;); }catch(e){}
  setTimeout(rebuildCharts,30);
});

/* =================== INIT =================== */
function startApp(){
  try{ if(localStorage.getItem(&#x27;cota_theme&#x27;)===&#x27;light&#x27;) document.body.classList.add(&#x27;light&#x27;); }catch(e){}
  renderHeaderStats();
  renderSummary();
  renderCounters();
  renderFilters();
  renderSessions();
  rebuildCharts();
}

(function(){

  const gate=document.getElementById(&#x27;lockgate&#x27;);

  const input=document.getElementById(&#x27;lockinput&#x27;);

  function reveal(){ gate.style.display=&#x27;none&#x27;; app.classList.remove(&#x27;app-hidden&#x27;); startApp(); }
  try{ if(sessionStorage.getItem(&#x27;cota_auth&#x27;)===&#x27;1&#x27;){ reveal(); return; } }catch(e){}
  function attempt(){
    if(input.value===PW){ try{sessionStorage.setItem(&#x27;cota_auth&#x27;,&#x27;1&#x27;);}catch(e){} reveal(); }
    else { err.textContent=&#x27;Incorrect password&#x27;; gate.classList.add(&#x27;shake&#x27;); setTimeout(()=&gt;gate.classList.remove(&#x27;shake&#x27;),400); input.value=&#x27;&#x27;; input.focus(); }
  }
  btn.addEventListener(&#x27;click&#x27;,attempt);
  input.addEventListener(&#x27;keydown&#x27;,e=&gt;{ if(e.key===&#x27;Enter&#x27;) attempt(); });
  input.focus();
})();

.filter-glabel{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-right:2px}
.filter-btn{font-family:var(--mono);font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);
  background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:6px 13px;cursor:pointer;transition:.15s}
.filter-btn:hover{border-color:var(--muted);color:var(--txt)}
.filter-btn.active{background:var(--txt);color:var(--bg);border-color:var(--txt);font-weight:700}
.filter-sep{width:1px;align-self:stretch;background:var(--line);margin:2px 6px}

/* ===== SESSION CARDS ===== */
.sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.session-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.session-head{padding:14px 16px;border-bottom:1px solid var(--line);position:relative}
.session-head::before{content:&quot;&quot;;position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--cc,var(--muted))}
.session-driver{font-family:var(--cond);font-weight:800;font-size:21px;text-transform:uppercase;letter-spacing:.3px;line-height:1}
.session-date{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tagpill{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.6px;padding:2px 7px;border-radius:3px;text-transform:uppercase;border:1px solid transparent}
.tagpill.gt12{background:rgba(236,110,160,.16);color:var(--gt12);border-color:rgba(236,110,160,.4)}
.tagpill.gtx{background:rgba(148,161,178,.14);color:var(--muted);border-color:var(--line2)}
.tagpill.grip{background:rgba(79,200,138,.14);color:var(--gray);border-color:rgba(79,200,138,.4)}
.tagpill.tire{background:rgba(230,184,79,.12);color:var(--accent);border-color:rgba(230,184,79,.35)}
.session-meta{display:flex;gap:14px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel2)}
.sm-item{display:flex;flex-direction:column}
.sm-k{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.sm-v{font-family:var(--cond);font-weight:700;font-size:18px;margin-top:2px}
.note-banner{font-family:var(--mono);font-size:11px;line-height:1.5;padding:9px 16px;background:rgba(230,184,79,.08);
  border-bottom:1px solid var(--line);color:var(--accent);letter-spacing:.3px;display:flex;gap:8px}
.note-banner.grip{background:rgba(79,200,138,.07);color:var(--gray)}
.runs{padding:6px 16px 12px}
.run{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.run:last-child{border-bottom:none}
.run-no{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:34px;font-weight:600}
.run-body{flex:1;min-width:0}
.run-desc{font-family:var(--cond);font-weight:600;font-size:15px;line-height:1.15;letter-spacing:.2px}
.run-tire{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.run-best{font-family:var(--cond);font-weight:800;font-size:20px;min-width:62px;text-align:right;letter-spacing:.3px}
.run-best.session-best{color:var(--gray)}
.run-best.outlier{color:var(--dim);text-decoration:line-through;text-decoration-thickness:1px}
.run-avg{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:54px;text-align:right}
.run-laps{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:30px;text-align:right}
.comments-block{padding:0 16px 14px;margin-top:auto}
.comment{font-family:var(--cond);font-size:13.5px;line-height:1.4;color:var(--muted);padding:8px 0;border-top:1px dashed var(--line2)}
.comment-no{font-family:var(--mono);font-size:11.5px;color:var(--dim);letter-spacing:.5px;margin-right:5px}

/* ===== LOCK GATE ===== */
.lockgate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(900px 500px at 50% -10%,rgba(230,184,79,.07),transparent 60%),var(--bg)}
.lockbox{width:min(360px,90vw);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:34px 30px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.lockbrand{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--accent);margin-bottom:10px;text-transform:uppercase;line-height:1.7}
.locktitle{font-family:var(--cond);font-size:30px;font-weight:900;text-transform:uppercase;margin:0 0 4px}
.locksub{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;color:var(--muted);margin:0 0 22px;text-transform:uppercase}
.lockinput{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:8px;color:var(--txt);font-family:var(--mono);font-size:15px;padding:13px 14px;letter-spacing:1px;outline:none;transition:.15s}
.lockinput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,184,79,.15)}
.lockbtn{width:100%;margin-top:14px;background:var(--accent);color:#0b0b0b;border:none;border-radius:8px;font-family:var(--cond);font-weight:800;font-size:16px;letter-spacing:1px;text-transform:uppercase;padding:13px;cursor:pointer;transition:.15s}
.lockbtn:hover{filter:brightness(1.08)}
.lockerr{min-height:18px;margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--jones)}
.lockgate.shake .lockbox{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.app-hidden{display:none}

@media(max-width:720px){
  h1{font-size:42px}
  .header{padding:24px 18px 20px}
  .content{padding:22px 18px 0}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .header-stats{margin-top:16px}
  .hstat{padding:4px 16px}
  .chart-wrap{height:260px}
  .chart-card{padding:16px 14px 12px}
  .counter-grid{grid-template-columns:repeat(2,1fr)}
  .chart-sub{max-width:100%;text-align:left}
  .sessions-grid{grid-template-columns:1fr}
  .run{gap:8px}
  .run-avg{min-width:46px;font-size:10.5px}
  .run-laps{min-width:26px;font-size:10.5px}
  .run-best{min-width:54px;font-size:18px}
  .run-desc{font-size:14px}
}

      {no:1, desc:&#x27;Running 19b Race setup post stop 1, post-scaled cold tire&#x27;, avg1:73.12, laps:7, times:[76.38,73.30,73.27,73.33,73.37,72.78], comment:&quot;I&#x27;m just too free pretty much everywhere. I don&#x27;t have enough rear stability or rear grip. I don&#x27;t want to change the platform because that part feels good, not like it&#x27;s rolling over.&quot;},

function sessionCleanBest(s){
  let best=null;
  s.runs.forEach(r=&gt;{ const b=runCleanBest(r); if(b!==null &amp;&amp; (best===null||b&lt;best)) best=b; });
  return best;
}
function sessionValidLaps(s){ return s.runs.reduce((n,r)=&gt;n+runValidLapCount(r),0); }

/* total valid laps across all sessions */
const TOTAL_VALID = SESSIONS.reduce((n,s)=&gt;n+sessionValidLaps(s),0);

/* clean best excluding grip-flagged drivers (headline) */
let cleanBest={time:Infinity,driver:null,session:null,run:null};
let gripBest={time:Infinity,driver:null,session:null,run:null};
SESSIONS.forEach(s=&gt;{
  s.runs.forEach(r=&gt;{
    const b=runCleanBest(r); if(b===null) return;
    const target=isGrip(s.driver)?gripBest:cleanBest;
    if(b&lt;target.time){ target.time=b; target.driver=s.driver; target.session=s.date; target.run=r.no; }
  });
});

/* =================== RENDER: SUMMARY =================== */
function renderSummary(){
  const g=document.getElementById(&#x27;summary-grid&#x27;);
  const cards=[];

  // headline overall best (no grip exclusion — all drivers valid)
  if(cleanBest.driver){
    cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-label&quot;&gt;Best Clean Lap&lt;/div&gt;
      &lt;div class=&quot;summary-val&quot; style=&quot;color:${driverColor(cleanBest.driver)}&quot;&gt;${cleanBest.time.toFixed(2)}&lt;/div&gt;
      &lt;div class=&quot;summary-sub&quot;&gt;${cleanBest.driver} · ${cleanBest.session} Run ${cleanBest.run}&lt;br&gt;off-pace laps excluded&lt;/div&gt;&lt;/div&gt;`);
  }

  // best run avg (lowest avg 1st-lap across valid runs)
  let bestAvg={time:Infinity,driver:null,session:null,run:null};
  SESSIONS.forEach(s=&gt;s.runs.forEach(r=&gt;{
    if(runCleanBest(r)===null||r.avg1&gt;=OUTLIER) return;
    if(r.avg1&lt;bestAvg.time){ bestAvg={time:r.avg1,driver:s.driver,session:s.date,run:r.no}; }
  }));
  if(bestAvg.driver){
    cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot; style=&quot;background:${driverColor(bestAvg.driver)}&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-label&quot;&gt;Best Run Avg&lt;/div&gt;
      &lt;div class=&quot;summary-val&quot; style=&quot;color:${driverColor(bestAvg.driver)}&quot;&gt;${bestAvg.time.toFixed(2)}&lt;/div&gt;
      &lt;div class=&quot;summary-sub&quot;&gt;${bestAvg.driver} · ${bestAvg.session} Run ${bestAvg.run}&lt;br&gt;avg of 1st 3 laps&lt;/div&gt;&lt;/div&gt;`);
  }

  // drivers count
  cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot; style=&quot;background:var(--muted)&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;summary-label&quot;&gt;Drivers&lt;/div&gt;
    &lt;div class=&quot;summary-val&quot;&gt;${DRIVERS_PRESENT.length}&lt;/div&gt;
    &lt;div class=&quot;summary-sub&quot;&gt;${DRIVERS_PRESENT.map(d=&gt;d.split(&#x27; &#x27;).pop()).join(&#x27; · &#x27;)}&lt;/div&gt;&lt;/div&gt;`);

  // dominant finding
  cards.push(`&lt;div class=&quot;summary-card&quot;&gt;&lt;div class=&quot;summary-card-bar&quot; style=&quot;background:var(--jones)&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;summary-label&quot;&gt;Dominant Finding&lt;/div&gt;
    &lt;div class=&quot;summary-val&quot; style=&quot;font-size:26px&quot;&gt;Rear Grip&lt;/div&gt;
    &lt;div class=&quot;summary-sub&quot;&gt;Cross-driver: too free / lacking lateral &amp;amp; rear grip, esp. through the Carousel, T7 &amp;amp; Bustop&lt;/div&gt;&lt;/div&gt;`);

  g.innerHTML=cards.join(&#x27;&#x27;);
}

/* =================== CHART 1: BEST LAP PER SESSION =================== */
let bestChartObj, stripChartObj;

/* ===== RACE DAY designation on Best Lap chart ===== */
const RACE_SORT = 20260509;          // race date in YYYYMMDD
const RACE_LABEL = &#x27;May 9&#x27;;      // human-readable race date
const raceDayPlugin = {
  id:&#x27;raceDay&#x27;,
  beforeDatasetsDraw(chart){
    const ordered=[...SESSIONS].sort((a,b)=&gt;a.dateSort-b.dateSort);
    // index of first post-race session
    let firstPost=-1;
    for(let i=0;i&lt;ordered.length;i++){ if(ordered[i].dateSort&gt;RACE_SORT){ firstPost=i; break; } }
    const {ctx,chartArea:{top,bottom,right},scales:{x}}=chart;
    const accent=cssVar(&#x27;--accent&#x27;);
    // boundary x: midway between last pre-race and first post-race point;
    // if no post-race sessions, pin the line just inside the right edge.
    let bx;
    if(firstPost===-1){ bx=right; }
    else if(firstPost===0){ bx=x.getPixelForValue(0)-12; }
    else { bx=(x.getPixelForValue(firstPost-1)+x.getPixelForValue(firstPost))/2; }
    ctx.save();
    // shade post-race band
    if(firstPost!==-1){
      ctx.fillStyle=accent; ctx.globalAlpha=0.06;
      ctx.fillRect(bx,top,right-bx,bottom-top);
      ctx.globalAlpha=1;
    }
    // vertical dashed race-day line
    ctx.strokeStyle=accent; ctx.globalAlpha=0.9; ctx.lineWidth=1.5;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(bx,top); ctx.lineTo(bx,bottom); ctx.stroke();
    ctx.setLineDash([]);
    // label
    ctx.globalAlpha=1; ctx.fillStyle=accent;
    ctx.font=&#x27;600 9px Barlow Condensed, sans-serif&#x27;;
    ctx.textBaseline=&#x27;top&#x27;;
    const txt=&#x27;RACE DAY · &#x27;+RACE_LABEL;
    if(firstPost===-1){
      // all sessions pre-race: label sits left of the right-edge line, rotated
      ctx.save();
      ctx.translate(bx-4,top+24); ctx.rotate(0);
      ctx.textAlign=&#x27;right&#x27;;
      ctx.fillText(txt,0,0);
      ctx.fillStyle=cssVar(&#x27;--dim&#x27;); ctx.font=&#x27;400 8px Barlow Condensed, sans-serif&#x27;;
      ctx.fillText(&#x27;(all sessions pre-race)&#x27;,0,12);
      ctx.restore();
    } else {
      ctx.textAlign=&#x27;left&#x27;;
      ctx.fillText(txt,bx+5,top+24);
      ctx.fillStyle=cssVar(&#x27;--dim&#x27;); ctx.font=&#x27;400 8px Barlow Condensed, sans-serif&#x27;;
      ctx.fillText(&#x27;post-race sessions →&#x27;,bx+5,top+36);
    }
    ctx.restore();
  }
};


/* ===== TRACK TIMELINE: version segments band across the top of the Best Lap chart ===== */
const TL_PALETTE = [&#x27;--dim&#x27;,&#x27;--hawk&#x27;,&#x27;--accent&#x27;,&#x27;--koch&#x27;,&#x27;--saw&#x27;,&#x27;--crews&#x27;];
const trackTimelinePlugin = {
  id:&#x27;trackTimeline&#x27;,
  beforeDatasetsDraw(chart){
    const ordered=[...SESSIONS].filter(s=&gt;!isGrip(s.driver)).sort((a,b)=&gt;a.dateSort-b.dateSort);
    if(!ordered.length) return;
    const {ctx,chartArea:{top,left,right},scales:{x}}=chart;
    const versions=ordered.map(s=&gt;s.track.replace(&#x27;WatkinsGlen_&#x27;,&#x27;&#x27;).replace(/_AltSF$/,&#x27;&#x27;));
    const segs=[]; let start=0;
    for(let i=1;i&lt;=versions.length;i++){
      if(i===versions.length || versions[i]!==versions[start]){
        segs.push({ver:versions[start], from:start, to:i-1}); start=i;
      }
    }
    // assign a stable color per distinct version (first-seen order)
    const verColor={}; let ci=0;
    segs.forEach(s=&gt;{ if(!(s.ver in verColor)){ verColor[s.ver]=TL_PALETTE[ci%TL_PALETTE.length]; ci++; } });
    const bandH=14, bandTop=top+2;
    ctx.save();
    segs.forEach(seg=&gt;{
      const x0 = seg.from===0 ? left : (x.getPixelForValue(seg.from-1)+x.getPixelForValue(seg.from))/2;
      const x1 = seg.to===versions.length-1 ? right : (x.getPixelForValue(seg.to)+x.getPixelForValue(seg.to+1))/2;
      const col = cssVar(verColor[seg.ver]||&#x27;--muted&#x27;);
      ctx.globalAlpha=0.16; ctx.fillStyle=col; ctx.fillRect(x0,bandTop,x1-x0,bandH); ctx.globalAlpha=1;
      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x0,bandTop); ctx.lineTo(x1,bandTop); ctx.stroke();
      if(x1-x0&gt;34){
        ctx.fillStyle=col; ctx.font=&#x27;700 9px Barlow Condensed, sans-serif&#x27;;
        ctx.textBaseline=&#x27;middle&#x27;; ctx.textAlign=&#x27;center&#x27;;
        ctx.fillText(seg.ver, (x0+x1)/2, bandTop+bandH/2+0.5);
      }
    });
    ctx.restore();
  }
};

function buildBestChart(){
  const ctx=document.getElementById(&#x27;bestChart&#x27;);
  const tick=cssVar(&#x27;--dim&#x27;), grid=cssVar(&#x27;--line&#x27;), panel=cssVar(&#x27;--panel&#x27;);
  const ordered=[...SESSIONS].sort((a,b)=&gt;a.dateSort-b.dateSort);
  const labels=ordered.map(s=&gt;`${s.date}`);

  // one dataset per driver, points only where they ran
  const datasets=DRIVERS_PRESENT.map(d=&gt;{
    const data=ordered.map(s=&gt; s.driver===d ? sessionCleanBest(s) : null);
    const hex=driverHex(d);
    return {
      label:d, data,
      borderColor:hex, backgroundColor:hex,
      pointRadius:6, pointHoverRadius:8, pointBorderColor:panel, pointBorderWidth:2,
      borderWidth:2, spanGaps:true, tension:.25,
      borderDash:isGrip(d)?[5,4]:[]
    };
  });

  if(bestChartObj) bestChartObj.destroy();
  bestChartObj=new Chart(ctx,{
    type:&#x27;line&#x27;,
    data:{labels,datasets},
    plugins:[raceDayPlugin, trackTimelinePlugin],
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{padding:{top:22}},
      interaction:{mode:&#x27;nearest&#x27;,intersect:true},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:panel, borderColor:grid, borderWidth:1,
          titleColor:cssVar(&#x27;--txt&#x27;), bodyColor:cssVar(&#x27;--muted&#x27;), padding:10,
          callbacks:{
            title:(items)=&gt;{ const s=ordered[items[0].dataIndex]; return `${s.date} · ${s.driver}`; },
            label:(c)=&gt;` Best clean: ${c.raw!=null?c.raw.toFixed(2)+&#x27;s&#x27;:&#x27;—&#x27;}`
          }
        }
      },
      scales:{
        x:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}}, grid:{color:grid} },
        y:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:11},callback:v=&gt;v.toFixed(1)},
            grid:{color:grid},
            title:{display:true,text:&#x27;Best Lap (s)&#x27;,color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}} }
      }
    }
  });
}

/* =================== CHART 2: AVG 1ST LAP STRIP =================== */
function buildStripChart(){
  const ctx=document.getElementById(&#x27;stripChart&#x27;);
  const tick=cssVar(&#x27;--dim&#x27;), grid=cssVar(&#x27;--line&#x27;), panel=cssVar(&#x27;--panel&#x27;);

  // build one scatter point per run: x = driver index, y = avg1
  // exclude pure-outlier runs and race-pace runs whose avg1 is far off clean qualifying pace
  const points=[]; const ranges={};
  DRIVERS_PRESENT.forEach((d,i)=&gt;{ ranges[d]={vals:[],i}; });
  SESSIONS.forEach(s=&gt;{
    s.runs.forEach(r=&gt;{
      const cavg=runCleanAvg(r);             // mean of this run&#x27;s clean laps (off-laps excluded)
      if(cavg===null) return;                // skip runs with no clean laps
      const i=DRIVERS_PRESENT.indexOf(s.driver);
      const jitter=(Math.random()-0.5)*0.34;
      points.push({x:i+jitter, y:cavg, _d:s.driver, _s:s.date, _r:r.no, _v001:false});
      ranges[s.driver].vals.push(cavg);
    });
  });

  const scatter={
    type:&#x27;scatter&#x27;,
    data:{datasets:[{
      data:points,
      pointRadius:5, pointHoverRadius:7,
      backgroundColor:points.map(p=&gt;driverHex(p._d)),
      borderColor:panel, borderWidth:1
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:panel, borderColor:grid, borderWidth:1,
          titleColor:cssVar(&#x27;--txt&#x27;), bodyColor:cssVar(&#x27;--muted&#x27;), padding:10,
          callbacks:{
            title:(items)=&gt;{ const p=items[0].raw; return `${p._d}`; },
            label:(c)=&gt;` ${c.raw._s} Run ${c.raw._r}: ${c.raw.y.toFixed(2)}s`
          }
        }
      },
      scales:{
        x:{ min:-0.6, max:DRIVERS_PRESENT.length-0.4,
            ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10},stepSize:1,
              callback:(v)=&gt;{ const i=Math.round(v); return DRIVERS_PRESENT[i]?DRIVERS_PRESENT[i].split(&#x27; &#x27;).pop():&#x27;&#x27;; }},
            grid:{color:grid} },
        y:{ ticks:{color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:11},callback:v=&gt;v.toFixed(1)},
            grid:{color:grid},
            title:{display:true,text:&#x27;Avg Clean Lap (s)&#x27;,color:tick,font:{family:&#x27;Barlow Condensed&#x27;,size:10}} }
      }
    },
    plugins:[{
      id:&#x27;violin&#x27;,
      beforeDatasetsDraw(chart){
        const {ctx,scales:{x,y}}=chart;
        DRIVERS_PRESENT.forEach((d,i)=&gt;{
          const vals=ranges[d].vals; if(vals.length&lt;2) return;
          const col=driverHex(d);
          const sorted=[...vals].sort((a,b)=&gt;a-b);
          const mn=Math.min(...vals), mx=Math.max(...vals);
          const n=sorted.length;
          const mean=vals.reduce((a,b)=&gt;a+b,0)/n;
          const sd=Math.sqrt(vals.reduce((a,b)=&gt;a+(b-mean)*(b-mean),0)/n) || 0.4;
          const bw=Math.max(1.06*sd*Math.pow(n,-0.2), 0.18);
          const pad=bw*1.5;
          const lo=mn-pad, hi=mx+pad;
          const STEPS=48;
          const dens=[]; let maxD=0;
          for(let k=0;k&lt;=STEPS;k++){
            const v=lo+(hi-lo)*k/STEPS;
            let sum=0;
            for(let j=0;j&lt;n;j++){ const u=(v-sorted[j])/bw; sum+=Math.exp(-0.5*u*u); }
            const den=sum/(n*bw*Math.sqrt(2*Math.PI));
            dens.push({v,den}); if(den&gt;maxD) maxD=den;
          }
          if(maxD&lt;=0) return;
          const halfMax=0.40;
          const cx=x.getPixelForValue(i);
          const wpx=Math.abs(x.getPixelForValue(i+halfMax)-cx);
          ctx.save();
          ctx.beginPath();
          dens.forEach((p,idx)=&gt;{
            const py=y.getPixelForValue(p.v);
            const w=(p.den/maxD)*wpx;
            if(idx===0) ctx.moveTo(cx+w,py); else ctx.lineTo(cx+w,py);
          });
          for(let idx=dens.length-1; idx&gt;=0; idx--){
            const py=y.getPixelForValue(dens[idx].v);
            const w=(dens[idx].den/maxD)*wpx;
            ctx.lineTo(cx-w,py);
          }
          ctx.closePath();
          ctx.fillStyle=col; ctx.globalAlpha=0.16; ctx.fill();
          ctx.globalAlpha=0.55; ctx.strokeStyle=col; ctx.lineWidth=1.25; ctx.stroke();
          ctx.restore();
        });
      }
    },{
      id:&#x27;meanMarker&#x27;,
      afterDatasetsDraw(chart){
        const {ctx,scales:{x,y}}=chart;
        DRIVERS_PRESENT.forEach((d,i)=&gt;{
          const vals=ranges[d].vals; if(!vals.length) return;
          const mean=vals.reduce((a,b)=&gt;a+b,0)/vals.length;
          const px=x.getPixelForValue(i), py=y.getPixelForValue(mean);
          const col=driverHex(d);
          ctx.save();
          ctx.translate(px,py); ctx.rotate(Math.PI/4);
          ctx.fillStyle=col; ctx.strokeStyle=cssVar(&#x27;--txt&#x27;); ctx.lineWidth=1.5;
          const s=5;
          ctx.fillRect(-s,-s,2*s,2*s); ctx.strokeRect(-s,-s,2*s,2*s);
          ctx.restore();
        });
      }
    }]
  };
  if(stripChartObj) stripChartObj.destroy();
  stripChartObj=new Chart(ctx,scatter);
}

/* =================== RENDER: DRIVER COUNTERS =================== */
function renderCounters(){
  const g=document.getElementById(&#x27;counter-grid&#x27;);
  const byDriver={};
  DRIVERS_PRESENT.forEach(d=&gt;byDriver[d]={laps:0,runs:0,sessions:0});
  SESSIONS.forEach(s=&gt;{
    byDriver[s.driver].sessions++;
    s.runs.forEach(r=&gt;{ byDriver[s.driver].laps+=runValidLapCount(r); byDriver[s.driver].runs++; });
  });
  g.innerHTML=DRIVERS_PRESENT.map(d=&gt;{
    const b=byDriver[d];
    return `&lt;div class=&quot;counter&quot; style=&quot;--cc:${driverColor(d)}&quot;&gt;
      &lt;div class=&quot;counter-name&quot;&gt;${d}&lt;/div&gt;
      &lt;div class=&quot;counter-laps&quot; style=&quot;color:${driverColor(d)}&quot;&gt;${b.laps}&lt;small&gt;valid laps&lt;/small&gt;&lt;/div&gt;
      &lt;div class=&quot;counter-sub&quot;&gt;${b.sessions} session${b.sessions&gt;1?&#x27;s&#x27;:&#x27;&#x27;} · ${b.runs} runs${isGrip(d)?&#x27; · +5% grip&#x27;:&#x27;&#x27;}&lt;/div&gt;
    &lt;/div&gt;`;
  }).join(&#x27;&#x27;);
}

/* =================== RENDER: FILTERS =================== */
let activeDriver=&#x27;all&#x27;, activeSim=&#x27;all&#x27;, activeTire=&#x27;all&#x27;;
function renderFilters(){
  const sims=[...new Set(SESSIONS.map(s=&gt;s.sim))];
  const tires=[...new Set(SESSIONS.map(s=&gt;s.tire).filter(Boolean))];
  const f=document.getElementById(&#x27;filters&#x27;);
  let html=`&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Driver&lt;/span&gt;`;
  html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;driver&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
  DRIVERS_PRESENT.forEach(d=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;driver&quot; data-val=&quot;${d}&quot;&gt;${d.split(&#x27; &#x27;).pop()}&lt;/button&gt;`; });
  html+=`&lt;/div&gt;&lt;div class=&quot;filter-sep&quot;&gt;&lt;/div&gt;&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Sim&lt;/span&gt;`;
  html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;sim&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
  sims.forEach(sm=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;sim&quot; data-val=&quot;${sm}&quot;&gt;${sm}&lt;/button&gt;`; });
  html+=`&lt;/div&gt;`;
  if(tires.length){
    html+=`&lt;div class=&quot;filter-sep&quot;&gt;&lt;/div&gt;&lt;div class=&quot;filter-group&quot;&gt;&lt;span class=&quot;filter-glabel&quot;&gt;Tire&lt;/span&gt;`;
    html+=`&lt;button class=&quot;filter-btn active&quot; data-type=&quot;tire&quot; data-val=&quot;all&quot;&gt;All&lt;/button&gt;`;
    tires.forEach(t=&gt;{ html+=`&lt;button class=&quot;filter-btn&quot; data-type=&quot;tire&quot; data-val=&quot;${t}&quot;&gt;${t}&lt;/button&gt;`; });
    html+=`&lt;/div&gt;`;
  }
  f.innerHTML=html;
  f.querySelectorAll(&#x27;.filter-btn&#x27;).forEach(btn=&gt;{
    btn.addEventListener(&#x27;click&#x27;,()=&gt;{
      const type=btn.dataset.type;
      f.querySelectorAll(`.filter-btn[data-type=&quot;${type}&quot;]`).forEach(b=&gt;b.classList.remove(&#x27;active&#x27;));
      btn.classList.add(&#x27;active&#x27;);
      if(type===&#x27;driver&#x27;) activeDriver=btn.dataset.val;
      else if(type===&#x27;sim&#x27;) activeSim=btn.dataset.val;
      else activeTire=btn.dataset.val;
      renderSessions();
    });
  });
}

/* =================== RENDER: SESSION CARDS =================== */
function renderSessions(){
  const g=document.getElementById(&#x27;sessions-grid&#x27;);
  const ordered=[...SESSIONS].sort((a,b)=&gt;a.dateSort-b.dateSort);
  const cards=ordered.filter(s=&gt;
    (activeDriver===&#x27;all&#x27;||s.driver===activeDriver) &amp;&amp;
    (activeSim===&#x27;all&#x27;||s.sim===activeSim) &amp;&amp;
    (activeTire===&#x27;all&#x27;||s.tire===activeTire)
  ).map(s=&gt;{
    const sBest=sessionCleanBest(s);
    const grip=isGrip(s.driver);
    const runsHtml=s.runs.map(r=&gt;{
      const cb=runCleanBest(r);
      const allOutlier=cb===null;
      const isBest=cb!==null &amp;&amp; sBest!==null &amp;&amp; Math.abs(cb-sBest)&lt;1e-6;
      const bestCls=allOutlier?&#x27;outlier&#x27;:(isBest?&#x27;session-best&#x27;:&#x27;&#x27;);
      const bestVal=allOutlier?(r.times[0]!=null?r.times[0].toFixed(2):&#x27;—&#x27;):cb.toFixed(2);
      return `&lt;div class=&quot;run&quot;&gt;
        &lt;div class=&quot;run-no&quot;&gt;R${r.no}&lt;/div&gt;
        &lt;div class=&quot;run-body&quot;&gt;
          &lt;div class=&quot;run-desc&quot;&gt;${r.desc}&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;run-avg&quot;&gt;${r.avg1!=null?r.avg1.toFixed(2):&#x27;—&#x27;}&lt;br&gt;&lt;span style=&quot;color:var(--dim)&quot;&gt;avg1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;run-laps&quot;&gt;${runValidLapCount(r)}L&lt;/div&gt;
        &lt;div class=&quot;run-best ${bestCls}&quot;&gt;${bestVal}&lt;/div&gt;
      &lt;/div&gt;`;
    }).join(&#x27;&#x27;);

    const comments=s.runs.filter(r=&gt;r.comment).map(r=&gt;
      `&lt;div class=&quot;comment&quot;&gt;&lt;span class=&quot;comment-no&quot;&gt;R${r.no}&lt;/span&gt;${r.comment}&lt;/div&gt;`
    ).join(&#x27;&#x27;);

    return `&lt;div class=&quot;session-card&quot; style=&quot;--cc:${driverColor(s.driver)}&quot;&gt;
      &lt;div class=&quot;session-head&quot;&gt;
        &lt;div class=&quot;session-driver&quot;&gt;${s.driver}&lt;/div&gt;

          &lt;span&gt;${s.date}, 2026 · ${s.car}&lt;/span&gt;

          ${grip?&#x27;&lt;span class=&quot;tagpill grip&quot;&gt;+5% grip&lt;/span&gt;&#x27;:&#x27;&#x27;}
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;session-meta&quot;&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Runs&lt;/div&gt;&lt;div class=&quot;sm-v&quot;&gt;${s.runs.length}&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Valid Laps&lt;/div&gt;&lt;div class=&quot;sm-v&quot;&gt;${sessionValidLaps(s)}&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;sm-item&quot;&gt;&lt;div class=&quot;sm-k&quot;&gt;Best Clean&lt;/div&gt;&lt;div class=&quot;sm-v&quot; style=&quot;color:${grip?driverColor(s.driver):&#x27;var(--accent)&#x27;}&quot;&gt;${sBest!=null?sBest.toFixed(2):&#x27;—&#x27;}&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      ${grip?`&lt;div class=&quot;note-banner grip&quot;&gt;▲ All ${s.driver.split(&#x27; &#x27;).pop()} sessions carry +5% artificial grip — excluded from headline comparisons.&lt;/div&gt;`:&#x27;&#x27;}
      &lt;div class=&quot;runs&quot;&gt;${runsHtml}&lt;/div&gt;
      ${comments?`&lt;div class=&quot;comments-block&quot;&gt;${comments}&lt;/div&gt;`:&#x27;&#x27;}
    &lt;/div&gt;`;
  }).join(&#x27;&#x27;);
  g.innerHTML=cards || `&lt;div style=&quot;font-family:var(--mono);font-size:12px;color:var(--dim);padding:20px&quot;&gt;No sessions match this filter.&lt;/div&gt;`;
}

function rebuildCharts(){ buildBestChart(); buildStripChart(); }
document.getElementById(&#x27;themebtn&#x27;).addEventListener(&#x27;click&#x27;,()=&gt;{

(function(){

/* =================== DERIVED =================== */
const DRIVERS_PRESENT = [...new Set(SESSIONS.map(s=&gt;s.driver))]
  .sort((a,b)=&gt;Object.keys(DRIVER_META).indexOf(a)-Object.keys(DRIVER_META).indexOf(b));

function cssVar(v){ return getComputedStyle(document.documentElement).getPropertyValue(v.replace(/var\(|\)/g,&#x27;&#x27;).trim()).trim(); }
function driverColor(d){ return DRIVER_META[d].color; }              // for CSS (e.g. style=&quot;color:var(--crews)&quot;)
function driverHex(d){ return cssVar(DRIVER_META[d].color); }        // resolved hex for canvas/Chart.js
function isGrip(d){ return !!DRIVER_META[d].grip; }
/* session-level grip: a grip-flagged driver&#x27;s session counts as +5% grip UNLESS
   the session is explicitly marked legitGrip (run at corrected/normal grip). */
function sessionGrip(s){ return isGrip(s.driver) &amp;&amp; !s.legitGrip; }
function isHeadlineVersion(track){ return /v101|v102|v103/.test(track); }

/* valid laps = times below outlier threshold; cleanBest = min valid time */

function runValidTimes(run){ return run.times.filter(t=&gt;t&lt;OUTLIER); }
function runCleanBest(run){ const v=runValidTimes(run); return v.length?Math.min(...v):null; }
function runCleanAvg(run){ const v=runValidTimes(run); return v.length? v.reduce((a,b)=&gt;a+b,0)/v.length : null; }
function runValidLapCount(run){ return runValidTimes(run).length; }

function sessionCleanBest(s){
  let best=null;
  s.runs.forEach(r=&gt;{ const b=runCleanBest(r); if(b!==null &amp;&amp; (best===null||b&lt;best)) best=b; });
  return best;
}
function sessionValidLaps(s){ return s.runs.reduce((n,r)=&gt;n+runValidLapCount(r),0); }

/* total valid laps across all sessions */
const TOTAL_VALID = SESSIONS.reduce((n,s)=&gt;n+sessionValidLaps(s),0);

/* clean best excluding grip-flagged drivers (headline) */
let cleanBest={time:Infinity,driver:null,session:null,run:null};
let gripBest={time:Infinity,driver:null,session:null,run:null};
SESSIONS.forEach(s=&gt;{
  if(!isHeadlineVersion(s.track)) return;
  s.runs.forEach(r=&gt;{
    const b=runCleanBest(r); if(b===null) return;
    const target=sessionGrip(s)?gripBest:cleanBest;
    if(b&lt;target.time){ target.time=b; target.driver=s.driver; target.session=s.date; target.run=r.no; }
  });
});
